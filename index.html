<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BaySync V2 · BALIE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0f0f1a;color:#fff;display:flex;flex-direction:column;
  user-select:none
}

/* HEADER */
.header{background:#1a1a2e;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.header .brand{font-size:16px;font-weight:700;text-align:center}
.header .brand span{color:#00e676}
.logo-hdr{height:26px;opacity:.7;flex-shrink:0}
.logo-hdr.intergamma{height:24px}

/* TABS */
.tab-bar{display:flex;background:#1a1a2e;border-top:1px solid #252540;flex-shrink:0}
.tab-btn{flex:1;padding:12px 4px;background:0;border:none;color:#666;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;position:relative;text-align:center;line-height:1.2}
.tab-btn.active{color:#00e676;background:rgba(0,230,118,.08)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:25%;width:50%;height:2px;background:#00e676;border-radius:2px}
.tab-btn .badge{background:#ff1744;color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:3px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:10px;display:block}
.content.hidden{display:none}

/* CONN */
.conn-row{display:flex;align-items:center;justify-content:space-between;padding:4px 14px;background:#1a1a2e;border-top:1px solid #252540;flex-shrink:0}
.conn-stat{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-dot.online{background:#00e676;box-shadow:0 0 4px #00e676}
.status-dot.offline{background:#ff5252}

/* TAB 1: DOORS — READ ONLY */
.door-view{font-size:10px;color:#555;text-align:center;padding:2px 0 6px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:480px;margin:0 auto}
.door{
  border-radius:12px;padding:14px 8px;text-align:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:80px;border:2px solid transparent;background:#1e1e36;
  cursor:default
}
.door .num{font-size:26px;font-weight:800;line-height:1.1}
.door .label{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:2px;font-weight:600}
.door.libre{border-color:#00e676;background:#1a2e1a}
.door.libre .num,.door.libre .label{color:#69f0ae}
.door.ocupado{border-color:#ff1744;background:#2e1a1a}
.door.ocupado .num,.door.ocupado .label{color:#ff5252}
.door.parcial{border-color:#ffd740;background:#2e2a1a}
.door.parcial .num,.door.parcial .label{color:#ffd740}

/* TAB 2: TRUCKS */
.truck-card{background:#1e1e36;border-radius:12px;padding:12px 14px;margin-bottom:8px;max-width:600px;margin-left:auto;margin-right:auto;border-left:3px solid #ffd740}
.truck-card.despatched{border-left-color:#00e676;opacity:.7}
.truck-card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.truck-card .id{font-size:18px;font-weight:800;color:#ffd740}
.truck-card.despatched .id{color:#00e676}
.truck-card .door{font-size:12px;color:#aaa;font-weight:600}
.truck-card .prov{font-size:11px;color:#888;margin-bottom:4px}
.truck-card .time{font-size:10px;color:#666}
.truck-card .status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.truck-card .badge-inside{background:#ffd74022;color:#ffd740;border:1px solid #ffd740}
.truck-card .badge-desp{background:#00e67622;color:#00e676;border:1px solid #00e676}
.truck-actions{display:flex;gap:6px;margin-top:6px}
.truck-actions button{flex:1;padding:8px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer}
.truck-actions .btn-dispatch{background:#ffd740;color:#111}
.truck-actions .btn-view{background:#333;color:#ccc}

.empty-state{text-align:center;padding:40px 20px;color:#555;font-size:13px}

/* DAY BAR */
.day-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;flex-shrink:0;background:#1a1a2e;border-top:1px solid #252540;gap:8px}
.day-status{font-size:11px;font-weight:600}
.day-status.open{color:#00e676}
.day-status.closed{color:#ff5252}
.day-btn{padding:6px 14px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer}
.day-btn.open-day{background:#00e676;color:#111}
.day-btn.close-day{background:#ff1744;color:#fff}
.day-btn.export-btn{background:#333;color:#ccc}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#1e1e36;border-radius:14px;padding:16px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-size:14px;color:#00e676;margin-bottom:10px}
.close-modal{float:right;background:0;border:none;color:#888;font-size:22px;cursor:pointer}
.firma-input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#141428;color:#fff;font-size:14px;outline:none;margin:6px 0}
.btn-primary{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;background:#00e676;color:#111;cursor:pointer;margin-top:4px}
.btn-primary:active{opacity:.7}

@media(max-width:380px){
  .door{min-height:68px;padding:8px 4px}
  .door .num{font-size:22px}
}
</style>
</head>
<body>

<div class="header">
  <img class="logo-hdr intergamma" src="intergamma-logo.svg" alt="Intergamma">
  <div class="brand">🚛 <span>BaySync</span> V2</div>
  <img class="logo-hdr dhl" src="dhl-logo.svg" alt="DHL">
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="muelles">🚪 Muelles</button>
  <button class="tab-btn" data-tab="curso">🚛 En curso <span class="badge" id="badgeCurso">0</span></button>
</div>

<div class="content" id="tabMuelles">
  <div class="door-view">📍 Vista en vivo · Actualizado desde almacén</div>
  <div class="grid" id="doorGrid"></div>
</div>

<div class="content hidden" id="tabCurso">
  <div id="truckList"></div>
</div>

<div class="day-bar">
  <div>
    <div class="day-status closed" id="dayStatus">🔴 Día cerrado</div>
    <div style="font-size:9px;color:#555" id="dayDate"></div>
  </div>
  <div style="display:flex;gap:5px">
    <button class="day-btn open-day" id="btnOpenDay">▶ Abrir día</button>
    <button class="day-btn close-day" id="btnCloseDay" style="display:none">■ Cerrar</button>
    <button class="day-btn export-btn" id="btnExport" style="display:none">⬇ CSV</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const DB_URL = 'https://baysync-583a2-default-rtdb.europe-west1.firebasedatabase.app';
const DOORS = [18,19,20,21,22,23,24,25,26];
const CATEGORIES = [
  {id:'pallet_euro',short:'Euro'},{id:'rcn',short:'RCN'},{id:'ww_pallet',short:'WW'},
  {id:'hplt',short:'HPLT'},{id:'rotom',short:'Rotom'},{id:'rolcontainer',short:'RCG'},
  {id:'colli',short:'Colli'},{id:'krat',short:'Krat'},{id:'rek',short:'Rek'}
];
const DAY_KEY = 'baysyncv2_day';
let dayOpen = false, dayDate = null, trucks = {};

function init(){
  loadDay(); loadTrucks(); setupTabs(); renderDoors({}); updateDayUI(); setupDayCtrl(); renderTruckList(); startPoll();
}
function loadDay(){
  try{const s=localStorage.getItem(DAY_KEY);if(s){const d=JSON.parse(s);dayOpen=d.open;dayDate=d.date}}catch(e){}
}
function saveDay(){localStorage.setItem(DAY_KEY,JSON.stringify({open:dayOpen,date:dayDate}));}
function loadTrucks(){try{const s=localStorage.getItem('baysyncv2_trucks');trucks=s?JSON.parse(s):{}}catch(e){trucks={}}}
function renderDoors(state){
  const g=document.getElementById('doorGrid');
  g.innerHTML=DOORS.map(d=>{
    const st=state[d]||'libre';
    const lb={libre:'🟢 Libre',ocupado:'🔴 Ocupado',parcial:'🟡 Parcial'};
    return `<div class="door ${st}"><div class="num">${d}</div><div class="label">${lb[st]}</div></div>`;
  }).join('');
}
function updateDayUI(){
  const ds=document.getElementById('dayStatus'),dd=document.getElementById('dayDate');
  const bo=document.getElementById('btnOpenDay'),bc=document.getElementById('btnCloseDay'),be=document.getElementById('btnExport');
  if(dayOpen){ds.className='day-status open';ds.textContent='🟢 Día abierto — '+dayDate;dd.textContent=fmtDate(dayDate);bo.style.display='none';bc.style.display='inline-block';be.style.display='inline-block';}
  else{ds.className='day-status closed';ds.textContent='🔴 Día cerrado';dd.textContent='Abre un día para empezar';bo.style.display='inline-block';bc.style.display='none';be.style.display='none';}
}
function fmtDate(d){try{return new Date(d+'T12:00:00').toLocaleDateString('es',{day:'2-digit',month:'long',year:'numeric'})}catch(e){return d}}
function openDay(){
  const t=new Date().toISOString().split('T')[0];
  dayOpen=true;dayDate=t;saveDay();updateDayUI();
  fetch(DB_URL+'/dia.json',{method:'PUT',body:JSON.stringify({abierto:true,fecha:t})}).catch(()=>{});
}
function closeDay(){dayOpen=false;saveDay();updateDayUI();fetch(DB_URL+'/dia.json',{method:'PUT',body:JSON.stringify({abierto:false,fecha:dayDate})}).catch(()=>{});}
function setupDayCtrl(){document.getElementById('btnOpenDay').onclick=openDay;document.getElementById('btnCloseDay').onclick=closeDay;document.getElementById('btnExport').onclick=exportCSV;}
function setupTabs(){
  document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.content').forEach(c=>c.classList.add('hidden'));
    document.getElementById('tab'+b.dataset.tab.charAt(0).toUpperCase()+b.dataset.tab.slice(1)).classList.remove('hidden');
    if(b.dataset.tab==='curso')renderTruckList();
  });
}
function renderTruckList(){
  const l=document.getElementById('truckList');
  const a=Object.values(trucks).filter(t=>t.activo&&!t.despachado);
  const d=Object.values(trucks).filter(t=>t.despachado);
  if(!a.length&&!d.length){l.innerHTML='<div class="empty-state">📭 No hay camiones hoy</div>';badge();return;}
  let h='';
  if(a.length){
    h+='<div style="font-size:11px;color:#ffd740;font-weight:700;margin-bottom:6px">🟡 EN CURSO ('+a.length+')</div>';
    a.sort((x,y)=>x.creado-y.creado);
    a.forEach(t=>h+=card(t,false));
  }
  if(d.length){
    h+='<div style="font-size:11px;color:#00e676;font-weight:700;margin:10px 0 6px">✅ DESPACHADOS ('+d.length+')</div>';
    d.sort((x,y)=>x.creado-y.creado);
    d.forEach(t=>h+=card(t,true));
  }
  l.innerHTML=h;
  document.querySelectorAll('.btn-v').forEach(b=>b.onclick=function(){openModal(this.dataset.id);});
  document.querySelectorAll('.btn-d').forEach(b=>b.onclick=function(){openDispatch(this.dataset.id);});
  badge();
}
function card(t,des){
  const p=t.proveedores.slice(0,3).join(', ')+(t.proveedores.length>3?' +'+(t.proveedores.length-3):'');
  const act=!des?`<div class="truck-actions">${!t.completado?'<button class="btn-view btn-v" data-id="'+t.id+'">📋 Ver</button>':'<button class="btn-dispatch btn-d" data-id="'+t.id+'">🔑 Despachar</button>'}</div>`
    :'<div class="truck-actions"><button class="btn-view btn-v" data-id="'+t.id+'">📋 Ver</button></div>';
  return `<div class="truck-card ${des?'despatched':''}"><div class="head"><div><span class="status-badge ${des?'badge-desp':'badge-inside'}">${des?'✅ Despachado':'🟡 En descarga'}</span></div><div class="id">#${t.id}</div></div>
    <div class="door">🚪 ${t.puerta}${t.puerta2?' + '+t.puerta2:''}  ·  🔑 ${t.llave}</div><div class="prov">📦 ${p}</div>
    <div class="time">🕐 Llegada: ${t.llegada||'--:--'}${t.salida?' · Salida: '+t.salida:''}</div>${act}</div>`;
}
function badge(){document.getElementById('badgeCurso').textContent=Object.values(trucks).filter(t=>t.activo&&!t.despachado).length;}
function openModal(id){
  const t=trucks[id];if(!t)return;
  const m=document.getElementById('modalContent');
  let ph='';t.proveedores.forEach((p,i)=>{const d=t.descargas[i]||{};ph+=`<div style="margin:8px 0;padding:8px;background:#141428;border-radius:8px"><div style="font-weight:700;font-size:13px;color:#fff;margin-bottom:4px">${p}</div><div style="font-size:10px;color:#888;display:flex;gap:6px;flex-wrap:wrap">${CATEGORIES.map(c=>`<span>${c.short}: <b style="color:#fff">${d[c.id]||0}</b></span>`).join(' | ')}</div><div style="font-size:10px;margin-top:3px;color:#aaa">${d.gericht?'→ Gericht ':''}${d.bont?'→ BONT':''}</div></div>`;});
  m.innerHTML=`<button class="close-modal" onclick="closeModal()">&times;</button><h3>🚛 Camión #${t.id}</h3><div style="font-size:12px;color:#888;margin-bottom:8px">Puerta ${t.puerta}${t.puerta2?' + '+t.puerta2:''} · 🔑 ${t.llave} · 🕐 ${t.llegada||'--:--'}</div>${ph}<div style="font-size:11px;color:#888;margin-top:8px">Firma encargado: <b style="color:#fff">${t.firma_encargado||'(pendiente)'}</b></div>${t.completado?'<div style="font-size:11px;color:#00e676;margin-top:4px">✅ Descarga completada</div>':''}${t.salida?'<div style="font-size:11px;color:#888;margin-top:4px">🕐 Salida: '+t.salida+' · 🔑 '+(t.llave_devuelta?'Devolvió llave':'Llave pendiente')+'</div>':''}${t.despachado?'<div style="font-size:11px;color:#00e676;margin-top:4px">✅ Despachado</div>':''}<button class="btn-primary" style="margin-top:10px" onclick="closeModal()">Cerrar</button>`;
  document.getElementById('modalOverlay').classList.add('show');
}
function openDispatch(id){
  const t=trucks[id];if(!t)return;
  const m=document.getElementById('modalContent');
  m.innerHTML=`<button class="close-modal" onclick="closeModal()">&times;</button>
    <h3>🔑 Despachar camión #${t.id}</h3>
    <p style="font-size:12px;color:#888;margin-bottom:10px">Registra salida y devolución de llave</p>
    <div class="form-group" style="margin-bottom:8px"><label style="font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px">🔑 ¿Devolvió la llave ${t.llave}?</label>
    <select id="keyReturned" style="width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#141428;color:#fff;font-size:14px;outline:none;margin-top:3px"><option value="si">Sí, devolvió la llave</option><option value="no">No, pendiente</option></select></div>
    <div><div style="font-size:11px;color:#aaa;margin-bottom:4px">Firma del formulario:</div><input class="firma-input" id="firmaBo" placeholder="Tu nombre"><input class="firma-input" id="firmaDriver" placeholder="Nombre del conductor (mayúsculas)"></div>
    <button class="btn-primary" id="btnConfirm">✅ CONFIRMAR DESPACHO</button>
    <button class="btn-primary" style="background:#ff1744;margin-top:6px" onclick="closeModal()">Cancelar</button>`;
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('btnConfirm').onclick=()=>{
    t.salida=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    t.llave_devuelta=document.getElementById('keyReturned').value==='si';
    t.despachado=true;
    t.firma_bo=document.getElementById('firmaBo').value.trim()||'(pendiente)';
    t.firma_driver=document.getElementById('firmaDriver').value.trim()||'(pendiente)';
    const du={};du[t.puerta]='libre';if(t.puerta2)du[t.puerta2]='libre';
    fetch(DB_URL+'/muelles/doors.json',{method:'PATCH',body:JSON.stringify(du)}).catch(()=>{});
    trucks[id]=t;localStorage.setItem('baysyncv2_trucks',JSON.stringify(trucks));
    if(navigator.onLine)fetch(DB_URL+'/camiones/'+id+'.json',{method:'PUT',body:JSON.stringify(t)}).catch(()=>{});
    closeModal();renderTruckList();
  };
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function exportCSV(){
  const rows=Object.values(trucks).filter(t=>t.fecha===dayDate);
  if(!rows.length){alert('No hay datos');return;}
  const h=['ID','Puerta','Proveedor','Llegada','Salida','Total min','Llave'];
  CATEGORIES.forEach(c=>h.push(c.short));
  h.push('Dirección','Firma Bo','Firma Driver');
  const csv=rows.map(t=>t.proveedores.map((p,i)=>{
    const d=t.descargas[i]||{};
    let min='';if(t.llegada&&t.salida){const[l1,l2]=t.llegada.split(':').map(Number);const[s1,s2]=t.salida.split(':').map(Number);let m=s2+s1*60-(l2+l1*60);if(m<0)m+=1440;min=m;}
    const dir=(d.gericht?'Gericht':'')+(d.gericht&&d.bont?'/':'')+(d.bont?'BONT':'');
    return [t.id,t.puerta,p,t.llegada||'',t.salida||'',min,t.llave,...CATEGORIES.map(c=>d[c.id]||0),dir,t.firma_bo||'',t.firma_driver||''].join(';');
  }).join('\n')).join('\n');
  const blob=new Blob(['\ufeff'+[h.join(';'),csv].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Lostijden_BONT_'+dayDate+'.csv';a.click();URL.revokeObjectURL(a);
}
function startPoll(){
  setInterval(async()=>{
    try{const r=await fetch(DB_URL+'/muelles.json');const d=await r.json();if(d&&d.doors)renderDoors(d.doors);}catch(e){}
  },2000);
  setInterval(async()=>{
    try{const r=await fetch(DB_URL+'/camiones.json');const d=await r.json();if(d){let c=false;
      Object.entries(d).forEach(([k,v])=>{if(v&&v.activo&&(!trucks[k]||JSON.stringify(trucks[k])!==JSON.stringify(v))){trucks[k]=v;c=true;}});
      if(c){localStorage.setItem('baysyncv2_trucks',JSON.stringify(trucks));renderTruckList();badge();}
    }}catch(e){}
  },3000);
}
init();
</script>
</body>
</html>
