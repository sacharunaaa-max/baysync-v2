<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BaySync V2 · BALIE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0f0f1a;color:#fff;display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none;touch-action:manipulation
}

/* HEADER */
.header{background:#1a1a2e;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.header .brand{font-size:16px;font-weight:700;text-align:center}
.header .brand span{color:#00e676}
.logo-hdr{height:26px;opacity:.7;flex-shrink:0}
.logo-hdr.intergamma{height:24px}

/* TABS */
.tab-bar{display:flex;background:#1a1a2e;border-top:1px solid #252540;flex-shrink:0}
.tab-btn{flex:1;padding:10px 4px;background:0;border:none;color:#666;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;position:relative;text-align:center;line-height:1.2}
.tab-btn.active{color:#00e676;background:rgba(0,230,118,.08)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:25%;width:50%;height:2px;background:#00e676;border-radius:2px}
.tab-btn .badge{background:#ff1744;color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:3px}
.tab-count{font-size:9px;opacity:.6;display:block;margin-top:1px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:10px;display:block}
.content.hidden{display:none}

/* CONN STATUS */
.conn-row{display:flex;align-items:center;justify-content:space-between;padding:4px 14px;background:#1a1a2e;border-top:1px solid #252540;flex-shrink:0}
.conn-stat{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-dot.online{background:#00e676;box-shadow:0 0 4px #00e676}
.status-dot.offline{background:#ff5252}
.status-dot.syncing{background:#ffd740;animation:pulse .8s infinite}
@keyframes pulse{50%{opacity:.4}}

/* TAB 1: DOOR GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:480px;margin:0 auto}
.door{
  position:relative;border-radius:12px;padding:14px 8px;text-align:center;
  cursor:pointer;transition:transform .1s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:80px;border:2px solid transparent;background:#1e1e36
}
.door:active{transform:scale(.93)}
.door .num{font-size:26px;font-weight:800;line-height:1.1}
.door .label{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:2px;font-weight:600}
.door.libre{border-color:#00e676;background:#1a2e1a}
.door.libre .num,.door.libre .label{color:#69f0ae}
.door.ocupado{border-color:#ff1744;background:#2e1a1a}
.door.ocupado .num,.door.ocupado .label{color:#ff5252}
.door.parcial{border-color:#ffd740;background:#2e2a1a}
.door.parcial .num,.door.parcial .label{color:#ffd740}
.door .badge{position:absolute;top:-4px;right:-4px;font-size:7px;padding:1px 5px;border-radius:10px;background:#ffd740;color:#111;display:none}
.door.dirty .badge{display:block}
.btn-send-door{width:100%;max-width:480px;margin:10px auto 0;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;background:#00e676;color:#111;cursor:pointer;transition:opacity .12s;display:block}
.btn-send-door:active{opacity:.7}
.btn-send-door:disabled{opacity:.25;cursor:default}
.btn-send-door .sub{display:block;font-size:9px;font-weight:400;opacity:.7;margin-top:1px}

/* TAB 2: REGISTRO */
.form-card{background:#1e1e36;border-radius:12px;padding:14px;margin-bottom:10px;max-width:600px;margin-left:auto;margin-right:auto}
.form-card h3{font-size:13px;color:#00e676;margin-bottom:10px;font-weight:700}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-group{flex:1;min-width:80px}
.form-group label{display:block;font-size:10px;color:#888;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #333;background:#141428;color:#fff;font-size:14px;outline:none;transition:border .15s}
.form-group input:focus,.form-group select:focus{border-color:#00e676}
.form-group input::placeholder{color:#555}

/* Supplier autocomplete */
.prov-container{margin-bottom:6px}
.prov-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.prov-row .prov-input{flex:1;position:relative}
.prov-row input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #333;background:#141428;color:#fff;font-size:13px;outline:none}
.prov-row input:focus{border-color:#00e676}
.prov-row .btn-remove{background:#ff1744;border:none;color:#fff;width:30px;height:30px;border-radius:8px;font-size:16px;cursor:pointer;flex-shrink:0;font-weight:700}
.btn-add-prov{background:0;border:1px dashed #444;color:#888;padding:8px;border-radius:8px;font-size:12px;cursor:pointer;width:100%;margin-bottom:8px;transition:.15s}
.btn-add-prov:hover{border-color:#00e676;color:#00e676}
.suggestions{position:absolute;top:100%;left:0;right:0;background:#1e1e36;border:1px solid #333;border-radius:0 0 8px 8px;max-height:160px;overflow-y:auto;z-index:10;display:none}
.suggestions.show{display:block}
.suggestions div{padding:7px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid #252540;color:#ccc}
.suggestions div:hover,.suggestions div.active{background:#00e67622;color:#fff}

.btn-primary{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;background:#00e676;color:#111;cursor:pointer;transition:opacity .12s;margin-top:4px}
.btn-primary:active{opacity:.7}
.btn-primary:disabled{opacity:.25;cursor:default}
.btn-danger{background:#ff1744}
.btn-outline{background:0;border:1px solid #333;color:#ccc}

/* TAB 3: EN CURSO */
.truck-card{background:#1e1e36;border-radius:12px;padding:12px 14px;margin-bottom:8px;max-width:600px;margin-left:auto;margin-right:auto;border-left:3px solid #ffd740}
.truck-card.despatched{border-left-color:#00e676;opacity:.7}
.truck-card .truck-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.truck-card .truck-id{font-size:18px;font-weight:800;color:#ffd740}
.truck-card.despatched .truck-id{color:#00e676}
.truck-card .truck-time{font-size:10px;color:#888}
.truck-card .truck-door{font-size:12px;color:#aaa;font-weight:600}
.truck-card .truck-prov{font-size:11px;color:#888;margin-bottom:6px}
.truck-card .truck-key{font-size:10px;color:#666}
.truck-card .status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.status-badge.inside{background:#ffd74022;color:#ffd740;border:1px solid #ffd740}
.status-badge.despatched{background:#00e67622;color:#00e676;border:1px solid #00e676}
.truck-actions{display:flex;gap:6px;margin-top:6px}
.truck-actions button{flex:1;padding:8px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer}
.truck-actions .btn-complete{background:#00e676;color:#111}
.truck-actions .btn-dispatch{background:#ffd740;color:#111}
.truck-actions .btn-view{background:#333;color:#ccc}

/* DAY CONTROL */
.day-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;flex-shrink:0;background:#1a1a2e;border-top:1px solid #252540;gap:8px}
.day-status{font-size:11px;font-weight:600}
.day-status.open{color:#00e676}
.day-status.closed{color:#ff5252}
.day-btn{padding:6px 14px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer}
.day-btn.open-day{background:#00e676;color:#111}
.day-btn.close-day{background:#ff1744;color:#fff}
.day-btn.export-btn{background:#333;color:#ccc}

.empty-state{text-align:center;padding:40px 20px;color:#555;font-size:13px}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#1e1e36;border-radius:14px;padding:16px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-size:14px;color:#00e676;margin-bottom:10px;font-weight:700}
.modal .close-modal{float:right;background:0;border:none;color:#888;font-size:22px;cursor:pointer}

/* BOX selection */
.box-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:8px 0}
.box-item{background:#141428;border-radius:8px;padding:8px;text-align:center;cursor:pointer;border:2px solid transparent;transition:.1s}
.box-item.selected{border-color:#00e676;background:#1a2e1a}
.box-item .box-label{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.3px}
.box-item .box-qty{font-size:18px;font-weight:800;color:#fff;margin-top:2px}

/* FIRMA */
.firma-input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#141428;color:#fff;font-size:14px;outline:none;margin:6px 0}

@media(max-width:380px){
  .door{min-height:68px;padding:8px 4px}
  .door .num{font-size:22px}
  .tab-btn{font-size:10px;padding:8px 3px}
  .form-row{gap:5px}
  .form-group{min-width:65px}
  .form-card{padding:10px}
  .box-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <img class="logo-hdr intergamma" src="intergamma-logo.svg" alt="Intergamma">
  <div class="brand">🚛 <span>BaySync</span> V2</div>
  <img class="logo-hdr dhl" src="dhl-logo.svg" alt="DHL">
</div>

<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="muelles">🚪 Muelles<span class="tab-count">18-26</span></button>
  <button class="tab-btn" data-tab="registro">📝 Registro<span class="tab-count">Nuevo camión</span></button>
  <button class="tab-btn" data-tab="curso">🚛 En curso<span class="badge" id="badgeCurso">0</span><span class="tab-count">Activos</span></button>
</div>

<div class="content" id="tabMuelles">
  <div class="grid" id="doorGrid"></div>
  <button class="btn-send-door" id="btnSendDoors" disabled>
    📤 ENVIAR ESTADO <span class="sub" id="sendSub">Último envío: —</span>
  </button>
</div>

<div class="content hidden" id="tabRegistro">
  <div class="form-card">
    <h3>📥 Registrar camión entrante</h3>
    <div class="form-row">
      <div class="form-group" style="min-width:70px">
        <label>ID Conductor</label>
        <input type="text" id="inputId" placeholder="01" inputmode="numeric" maxlength="4">
      </div>
      <div class="form-group" style="min-width:80px">
        <label>Puerta</label>
        <select id="inputDoor">
          <option value="">—</option>
        </select>
      </div>
      <div class="form-group" style="min-width:70px">
        <label>2ª Puerta</label>
        <select id="inputDoor2">
          <option value="">—</option>
        </select>
      </div>
      <div class="form-group" style="min-width:70px">
        <label>🔑 Llave</label>
        <input type="text" id="inputKey" placeholder="B3" maxlength="6">
      </div>
    </div>
    <label style="display:block;font-size:10px;color:#888;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Proveedores</label>
    <div id="providersList"></div>
    <button class="btn-add-prov" id="btnAddProv">+ Agregar proveedor</button>
    <button class="btn-primary" id="btnSendTruck" disabled>📤 ENVIAR A DESCARGA</button>
  </div>
</div>

<div class="content hidden" id="tabCurso">
  <div id="truckList"></div>
</div>

<div class="day-bar">
  <div>
    <div class="day-status closed" id="dayStatus">🔴 Día cerrado</div>
    <div style="font-size:9px;color:#555" id="dayDate"></div>
  </div>
  <div style="display:flex;gap:5px">
    <button class="day-btn open-day" id="btnOpenDay">▶ Abrir día</button>
    <button class="day-btn close-day" id="btnCloseDay" style="display:none">■ Cerrar</button>
    <button class="day-btn export-btn" id="btnExport" style="display:none">⬇ CSV</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const DB_URL = 'https://baysync-583a2-default-rtdb.europe-west1.firebasedatabase.app';
const SUPPLIERS = [
"Akzo Nobel Coatings","Akzo Belgie","Allibert","Batavia","Bison International",
"Black & Decker (NL)","Black & Decker (Ceva)","Brilliant AG","Calodar NV",
"Coram (Leadtimer)","Durieu","Eglo Verlichting Nederland BV","Electro Cirkel Retail B.V.",
"Electrolux Home Products","Eltra B.V. (Leadtimer)","EUROMAC","Gevavi Schoeisel B.V.",
"Gimeg Nederland BV","Graham & Brown","GROHE BELGIE NV/SA","GROHE NEDERLAND B.V.",
"Hansgrohe","Hugo Brennenstuhl","Karcher","Koopman International B.V.","Korver Holland B.V.",
"KPE Holland","LENCO","Lightmakers SNEL","LUCIDE","LUTEC","Makita Belgie N.V.",
"Makita Nederland B.V.","Martin Mathys","Mega Collections","Navstar",
"Noord West Nederland","Novatech NV","Pick Up International B.V.","Robert Bosch B.V.",
"Service Best International (Leadtimer)","SHI","Sigma Coatings","Signify Netherlands B.V.",
"Soudal N.V.","SPS de Steenbok","Suki International B.V.","Talen Tools",
"Tiger (Leadtimer)","Tristar Retouradres","V33 (DISTRILOG)","Van Loon Sealskin",
"Van Spijk Agenturen","Vepa Bins B.V.","Vliegenthart","Weber","Stipt","Vebon NV",
"Arvesta","Aqmos"
].sort((a,b)=>a.localeCompare(b));

// Product categories (from Intergamma form)
const CATEGORIES = [
  {id:'pallet_euro',label:'Euro',short:'Euro'},
  {id:'rcn',label:'RCN',short:'RCN'},
  {id:'ww_pallet',label:'WW pltg',short:'WW'},
  {id:'hplt',label:'HPLT',short:'HPLT'},
  {id:'rotom',label:'Rotom',short:'Rotom'},
  {id:'rolcontainer',label:'Rolcontainer',short:'RCG'},
  {id:'colli',label:'Colli',short:'Colli'},
  {id:'krat',label:'Krat',short:'Krat'},
  {id:'rek',label:'Rek',short:'Rek'}
];

const DOORS = [18,19,20,21,22,23,24,25,26];
const STORAGE_KEY = 'baysyncv2_doors';
const DAY_KEY = 'baysyncv2_day';

// ============================================================
//  STATE
// ============================================================
let doorsState = {};
let dirty = false;
let lastSent = null;
let dayOpen = false;
let dayDate = null;
let trucks = {};
let activeTabs = {};
let currentTab = 'muelles';

// ============================================================
//  INIT
// ============================================================
function init() {
  loadDoorsState();
  initDoorSelects();
  loadDayState();
  loadTrucks();
  setupTabs();
  renderDoors();
  updateDayUI();
  setupDayControls();
  setupProvAutoComplete();
  setupRegistroForm();
  renderTruckList();
  startPolling();
  setInterval(()=>{if(dirty) sendDoors()},30000);
}

// ============================================================
//  DOORS STATE
// ============================================================
function loadDoorsState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    doorsState = s ? JSON.parse(s) : initDoors();
  } catch(e) { doorsState = initDoors(); }
  saveDoors();
}

function initDoors() {
  const o={}; DOORS.forEach(d=>{o[d]='libre'}); return o;
}

function saveDoors() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(doorsState));
}

function toggleDoor(d) {
  const cur = doorsState[d]||'libre';
  doorsState[d] = cur==='libre'?'ocupado':cur==='ocupado'?'parcial':'libre';
  saveDoors(); dirty = true; renderDoors(); updateDoorUI();
}

function renderDoors() {
  const grid = document.getElementById('doorGrid');
  grid.innerHTML = '';
  DOORS.forEach(d => {
    const el = document.createElement('div');
    const st = doorsState[d]||'libre';
    el.className = 'door ' + st;
    el.dataset.door = d;
    const labels = {libre:'🟢 Libre',ocupado:'🔴 Ocupado',parcial:'🟡 Parcial'};
    el.innerHTML = `<span class="badge">✏️</span><div class="num">${d}</div><div class="label">${labels[st]||'🟢 Libre'}</div>`;
    el.addEventListener('click', ()=>toggleDoor(d));
    grid.appendChild(el);
  });
  document.querySelectorAll('#doorGrid .door').forEach(el=>el.classList.toggle('dirty',dirty));
}

function updateDoorUI() {
  const btn = document.getElementById('btnSendDoors');
  btn.disabled = !dirty;
  const sub = document.getElementById('sendSub');
  if (lastSent) sub.textContent = 'Último envío: '+lastSent+(dirty?' · Pendiente':'');
  else sub.textContent = dirty ? 'Hay cambios sin enviar' : 'Último envío: —';
  document.querySelectorAll('#doorGrid .door').forEach(el=>el.classList.toggle('dirty',dirty));
}

async function sendDoors() {
  setConn('syncing','Enviando...');
  if (navigator.onLine) {
    try {
      const payload = { doors:{...doorsState}, sentAt:Date.now() };
      await fetch(DB_URL+'/muelles.json',{method:'PUT',body:JSON.stringify(payload)});
    } catch(e) {}
  }
  dirty = false;
  lastSent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  saveDoors(); updateDoorUI(); setConn('online','OK');
}

// ============================================================
//  DOOR SELECTS
// ============================================================
function initDoorSelects() {
  const s1 = document.getElementById('inputDoor');
  const s2 = document.getElementById('inputDoor2');
  DOORS.forEach(d => {
    const o1 = document.createElement('option'); o1.value=d; o1.textContent='Puerta '+d;
    s1.appendChild(o1);
    const o2 = document.createElement('option'); o2.value=d; o2.textContent='Puerta '+d;
    s2.appendChild(o2);
  });
}

// ============================================================
//  DAY STATE
// ============================================================
function loadDayState() {
  const s = localStorage.getItem(DAY_KEY);
  if (s) {
    try {
      const d = JSON.parse(s);
      dayOpen = d.open;
      dayDate = d.date;
    } catch(e) {}
  }
}

function saveDayState() {
  localStorage.setItem(DAY_KEY, JSON.stringify({open:dayOpen,date:dayDate}));
}

function updateDayUI() {
  const ds = document.getElementById('dayStatus');
  const dd = document.getElementById('dayDate');
  const bo = document.getElementById('btnOpenDay');
  const bc = document.getElementById('btnCloseDay');
  const be = document.getElementById('btnExport');
  if (dayOpen) {
    ds.className = 'day-status open';
    ds.textContent = '🟢 Día abierto — '+dayDate;
    dd.textContent = formatDate(dayDate);
    bo.style.display = 'none';
    bc.style.display = 'inline-block';
    be.style.display = 'inline-block';
  } else {
    ds.className = 'day-status closed';
    ds.textContent = '🔴 Día cerrado';
    dd.textContent = 'Abre un día para empezar';
    bo.style.display = 'inline-block';
    bc.style.display = 'none';
    be.style.display = 'none';
  }
}

function formatDate(dStr) {
  if (!dStr) return '';
  try {
    const d = new Date(dStr+'T12:00:00');
    return d.toLocaleDateString('es',{day:'2-digit',month:'long',year:'numeric'});
  } catch(e) { return dStr; }
}

function openDay() {
  const today = new Date().toISOString().split('T')[0];
  dayOpen = true;
  dayDate = today;
  saveDayState();
  updateDayUI();
  // Save to Firebase
  fetch(DB_URL+'/dia.json',{method:'PUT',body:JSON.stringify({abierto:true,fecha:today})}).catch(()=>{});
  // Enable registro form
  document.getElementById('btnSendTruck').disabled = false;
}

function closeDay() {
  dayOpen = false;
  saveDayState();
  updateDayUI();
  fetch(DB_URL+'/dia.json',{method:'PUT',body:JSON.stringify({abierto:false,fecha:dayDate})}).catch(()=>{});
  document.getElementById('btnSendTruck').disabled = true;
}

function setupDayControls() {
  document.getElementById('btnOpenDay').addEventListener('click',openDay);
  document.getElementById('btnCloseDay').addEventListener('click',closeDay);
  document.getElementById('btnExport').addEventListener('click',exportCSV);
}

// ============================================================
//  TABS
// ============================================================
function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', ()=>{
      currentTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.content').forEach(c=>c.classList.add('hidden'));
      document.getElementById('tab'+currentTab.charAt(0).toUpperCase()+currentTab.slice(1)).classList.remove('hidden');
      if (currentTab === 'curso') renderTruckList();
    });
  });
}

// ============================================================
//  REGISTRO FORM
// ============================================================
let provCount = 1;

function setupProvAutoComplete() {
  document.getElementById('btnAddProv').addEventListener('click', ()=>addProvRow());
  addProvRow(); // first row
  document.getElementById('inputId').addEventListener('input', checkRegistroForm);
  document.getElementById('inputDoor').addEventListener('change', checkRegistroForm);
  document.getElementById('inputKey').addEventListener('input', checkRegistroForm);
}

function addProvRow(val) {
  const container = document.getElementById('providersList');
  const idx = provCount++;
  const row = document.createElement('div');
  row.className = 'prov-row';
  row.dataset.idx = idx;
  row.innerHTML = `
    <span style="color:#888;font-size:11px;width:20px;flex-shrink:0;text-align:center">#${idx}</span>
    <div class="prov-input">
      <input type="text" class="prov-autocomplete" placeholder="Escribe proveedor..." value="${val||''}" autocomplete="off">
      <div class="suggestions"></div>
    </div>
    <button class="btn-remove" onclick="removeProvRow(this)">✕</button>
  `;
  container.appendChild(row);
  const input = row.querySelector('.prov-autocomplete');
  const sugg = row.querySelector('.suggestions');
  setupAutoComplete(input, sugg);
  input.addEventListener('input', checkRegistroForm);
  if (!val) input.focus();
  checkRegistroForm();
}

function removeProvRow(btn) {
  const row = btn.closest('.prov-row');
  row.remove();
  checkRegistroForm();
}

function setupAutoComplete(input, sugg) {
  input.addEventListener('input', function() {
    const v = this.value.toLowerCase().trim();
    sugg.innerHTML = '';
    if (!v) { sugg.classList.remove('show'); return; }
    const matches = SUPPLIERS.filter(s => s.toLowerCase().includes(v));
    if (matches.length === 0) { sugg.classList.remove('show'); return; }
    matches.forEach(m => {
      const div = document.createElement('div');
      div.textContent = m;
      div.addEventListener('click', ()=>{
        input.value = m;
        sugg.classList.remove('show');
        checkRegistroForm();
      });
      sugg.appendChild(div);
    });
    sugg.classList.add('show');
  });
  input.addEventListener('blur', ()=>setTimeout(()=>sugg.classList.remove('show'),200));
  input.addEventListener('focus', function() {
    if (this.value.trim()) {
      const evt = new Event('input');
      this.dispatchEvent(evt);
    }
  });
}

function checkRegistroForm() {
  const id = document.getElementById('inputId').value.trim();
  const door = document.getElementById('inputDoor').value;
  const key = document.getElementById('inputKey').value.trim();
  const provs = document.querySelectorAll('.prov-autocomplete');
  let hasProv = false;
  provs.forEach(p => { if (p.value.trim()) hasProv = true; });
  const ok = dayOpen && id && door && key && hasProv;
  document.getElementById('btnSendTruck').disabled = !ok;
}

function setupRegistroForm() {
  document.getElementById('btnSendTruck').addEventListener('click', sendTruck);
}

async function sendTruck() {
  const id = document.getElementById('inputId').value.trim().padStart(2,'0');
  const puerta = parseInt(document.getElementById('inputDoor').value);
  const puerta2 = document.getElementById('inputDoor2').value ? parseInt(document.getElementById('inputDoor2').value) : null;
  const llave = document.getElementById('inputKey').value.trim();
  const provInputs = document.querySelectorAll('.prov-autocomplete');
  const proveedores = [];
  provInputs.forEach(p => {
    const v = p.value.trim();
    if (v) proveedores.push(v);
  });
  if (!id || !puerta || !llave || proveedores.length === 0) return;

  const truck = {
    id: id,
    creado: Date.now(),
    llegada: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    proveedores: proveedores,
    puerta: puerta,
    puerta2: puerta2,
    llave: llave,
    activo: true,
    descargando: false,
    completado: false,
    despachado: false,
    descargas: {},
    firma_encargado: '',
    salida: null,
    llave_devuelta: false,
    fecha: dayDate
  };

  // Init empty descargas for each supplier
  proveedores.forEach((_, i) => {
    truck.descargas[i] = { proveedor: proveedores[i], gericht: false, bont: false };
    CATEGORIES.forEach(c => { truck.descargas[i][c.id] = 0; });
  });

  // Save to Firebase
  if (navigator.onLine) {
    try {
      await fetch(DB_URL+'/camiones/'+id+'.json',{method:'PUT',body:JSON.stringify(truck)});
    } catch(e) { saveTruckLocal(id, truck); }
  } else {
    saveTruckLocal(id, truck);
  }

  // Mark door as occupied
  doorsState[puerta] = 'ocupado';
  if (puerta2) doorsState[puerta2] = 'ocupado';
  saveDoors(); dirty = true; renderDoors(); updateDoorUI();
  sendDoors();

  // Reset form
  document.getElementById('inputId').value = '';
  document.getElementById('inputDoor').value = '';
  document.getElementById('inputDoor2').value = '';
  document.getElementById('inputKey').value = '';
  document.getElementById('providersList').innerHTML = '';
  provCount = 0;
  addProvRow();
  checkRegistroForm();

  // Update badge
  loadTrucks();
  updateTruckBadge();
  renderTruckList();
}

function saveTruckLocal(id, truck) {
  trucks[id] = truck;
  localStorage.setItem('baysyncv2_trucks', JSON.stringify(trucks));
}

function loadTrucks() {
  try {
    const s = localStorage.getItem('baysyncv2_trucks');
    trucks = s ? JSON.parse(s) : {};
  } catch(e) { trucks = {}; }
}

// ============================================================
//  TRUCK LIST (Tab 3 - En curso)
// ============================================================
function renderTruckList() {
  const list = document.getElementById('truckList');
  const active = Object.values(trucks).filter(t => t.activo && !t.despachado);
  const despatched = Object.values(trucks).filter(t => t.despachado);

  if (active.length === 0 && despatched.length === 0) {
    list.innerHTML = '<div class="empty-state">📭 No hay camiones registrados hoy</div>';
    updateTruckBadge();
    return;
  }

  let html = '';
  if (active.length > 0) {
    html += '<div style="font-size:11px;color:#ffd740;font-weight:700;margin-bottom:6px;padding-left:4px">🟡 EN CURSO ('+active.length+')</div>';
    active.forEach(t => { html += renderTruckCard(t, false); });
  }
  if (despatched.length > 0) {
    html += '<div style="font-size:11px;color:#00e676;font-weight:700;margin:10px 0 6px;padding-left:4px">✅ DESPACHADOS ('+despatched.length+')</div>';
    despatched.forEach(t => { html += renderTruckCard(t, true); });
  }
  list.innerHTML = html;

  // Re-bind click handlers
  document.querySelectorAll('.btn-view-truck').forEach(b => {
    b.addEventListener('click', function() { openTruckModal(this.dataset.id); });
  });
  document.querySelectorAll('.btn-dispatch-truck').forEach(b => {
    b.addEventListener('click', function() { openDispatchModal(this.dataset.id); });
  });

  updateTruckBadge();
}

function renderTruckCard(t, despatched) {
  const provStr = t.proveedores.slice(0,3).join(', ') + (t.proveedores.length > 3 ? ' +'+(t.proveedores.length-3) : '');
  const timeSince = despatched ? '' : formatTimeSince(t.creado);
  return `
    <div class="truck-card ${despatched?'despatched':''}">
      <div class="truck-header">
        <div>
          <span class="status-badge ${despatched?'despatched':'inside'}">${despatched?'✅ Despachado':'🟡 En descarga'}</span>
        </div>
        <div class="truck-id">#${t.id}</div>
      </div>
      <div class="truck-door">🚪 Puerta ${t.puerta}${t.puerta2?' + '+t.puerta2:''}  |  🔑 ${t.llave}</div>
      <div class="truck-prov">📦 ${provStr}</div>
      <div class="truck-time">🕐 Llegada: ${t.llegada||'--:--'}${timeSince?' ('+timeSince+')':''}${t.salida?' · Salida: '+t.salida:''}</div>
      ${!despatched ? `
        <div class="truck-actions">
          ${!t.completado ? `<button class="btn-view btn-view-truck" data-id="${t.id}">📋 Ver detalle</button>` : `<button class="btn-dispatch btn-dispatch-truck" data-id="${t.id}">🔑 Despachar</button>`}
        </div>
      ` : `
        <div class="truck-actions">
          <button class="btn-view btn-view-truck" data-id="${t.id}">📋 Ver</button>
        </div>
      `}
    </div>
  `;
}

function updateTruckBadge() {
  const active = Object.values(trucks).filter(t => t.activo && !t.despachado);
  document.getElementById('badgeCurso').textContent = active.length;
}

function formatTimeSince(ts) {
  if (!ts) return '';
  const min = Math.floor((Date.now() - ts) / 60000);
  if (min < 1) return '<1 min';
  if (min < 60) return min + ' min';
  const h = Math.floor(min/60); const m = min%60;
  return h+'h'+ (m>0?m+'m':'');
}

// ============================================================
//  TRUCK MODAL (View details for encargado or dispatch)
// ============================================================
function openTruckModal(id) {
  const t = trucks[id];
  if (!t) return;
  const modal = document.getElementById('modalContent');
  let provHtml = '';
  t.proveedores.forEach((p, i) => {
    const d = t.descargas[i] || {};
    provHtml += `<div style="margin:8px 0;padding:8px;background:#141428;border-radius:8px">
      <div style="font-weight:700;font-size:13px;color:#fff;margin-bottom:4px">${p}</div>
      <div style="font-size:10px;color:#888;display:flex;gap:6px;flex-wrap:wrap">
        ${CATEGORIES.map(c => `<span>${c.short}: <b style="color:#fff">${d[c.id]||0}</b></span>`).join(' | ')}
      </div>
      <div style="font-size:10px;margin-top:3px;color:#aaa">${d.gericht?'→ Gericht ':' '} ${d.bont?'→ BONT':''}</div>
    </div>`;
  });

  modal.innerHTML = `
    <button class="close-modal" onclick="closeModal()">&times;</button>
    <h3>🚛 Camión #${t.id}</h3>
    <div style="font-size:12px;color:#888;margin-bottom:8px">
      Puerta ${t.puerta}${t.puerta2?' + '+t.puerta2:''} · 🔑 ${t.llave} · 🕐 ${t.llegada||'--:--'}
    </div>
    ${provHtml}
    <div style="font-size:11px;color:#888;margin-top:8px">Firma encargado: <b style="color:#fff">${t.firma_encargado||'(pendiente)'}</b></div>
    ${t.completado ? `<div style="font-size:11px;color:#00e676;margin-top:4px">✅ Descarga completada</div>` : ''}
    ${t.salida ? `<div style="font-size:11px;color:#888;margin-top:4px">🕐 Salida: ${t.salida} · 🔑 Llave devuelta: ${t.llave_devuelta?'Sí':'No'}</div>` : ''}
    ${t.despachado ? `<div style="font-size:11px;color:#00e676;margin-top:4px">✅ Despachado</div>` : ''}
    <button class="btn-primary" style="margin-top:10px" onclick="closeModal()">Cerrar</button>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

function openDispatchModal(id) {
  const t = trucks[id];
  if (!t) return;
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <button class="close-modal" onclick="closeModal()">&times;</button>
    <h3>🔑 Despachar camión #${t.id}</h3>
    <p style="font-size:12px;color:#888;margin-bottom:10px">Registra la salida del conductor y devolución de llave</p>
    <div class="form-group" style="margin-bottom:8px">
      <label>🔑 ¿Devolvió la llave ${t.llave}?</label>
      <select id="keyReturned" style="width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#141428;color:#fff;font-size:14px;outline:none">
        <option value="si">Sí, devolvió la llave</option>
        <option value="no">No, pendiente</option>
      </select>
    </div>
    <div id="signatureFields" style="margin:8px 0">
      <div style="font-size:11px;color:#aaa;margin-bottom:4px">Firma del formulario:</div>
      <input class="firma-input" id="firmaBo" placeholder="Tu nombre">
      <input class="firma-input" id="firmaDriver" placeholder="Nombre del conductor (en mayúsculas)">
    </div>
    <button class="btn-primary" id="btnConfirmDispatch">✅ CONFIRMAR DESPACHO</button>
    <button class="btn-primary btn-danger" style="margin-top:6px" onclick="closeModal()">Cancelar</button>
  `;
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('btnConfirmDispatch').addEventListener('click', ()=>confirmDispatch(id));
}

function confirmDispatch(id) {
  const t = trucks[id];
  if (!t) return;
  const keyOk = document.getElementById('keyReturned').value === 'si';
  const firmaBo = document.getElementById('firmaBo').value.trim();
  const firmaDriver = document.getElementById('firmaDriver').value.trim();

  t.salida = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  t.llave_devuelta = keyOk;
  t.despachado = true;
  t.firma_bo = firmaBo || '(pendiente)';
  t.firma_driver = firmaDriver || '(pendiente)';

  // Free the door
  if (doorsState[t.puerta]) doorsState[t.puerta] = 'libre';
  if (t.puerta2 && doorsState[t.puerta2]) doorsState[t.puerta2] = 'libre';
  saveDoors(); dirty = true; renderDoors(); updateDoorUI();
  sendDoors();

  // Save
  trucks[id] = t;
  localStorage.setItem('baysyncv2_trucks', JSON.stringify(trucks));
  if (navigator.onLine) {
    fetch(DB_URL+'/camiones/'+id+'.json',{method:'PUT',body:JSON.stringify(t)}).catch(()=>{});
  }

  closeModal();
  renderTruckList();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ============================================================
//  EXPORT CSV
// ============================================================
function exportCSV() {
  const active = Object.values(trucks).filter(t => t.fecha === dayDate);
  if (active.length === 0) {
    alert('No hay datos para exportar');
    return;
  }

  // Build CSV
  const headers = ['ID','Puerta','Proveedor','Llegada','Salida','Total min','Llave'];
  CATEGORIES.forEach(c => { headers.push(c.short); });
  headers.push('Dirección','Firma Bo','Firma Driver');

  let rows = [];
  active.forEach(t => {
    const llegada = t.llegada||'';
    const salida = t.salida||'';
    const totalMin = t.llegada && t.salida ? calcMinDiff(t.llegada, t.salida) : '';

    t.proveedores.forEach((p, i) => {
      const d = t.descargas[i] || {};
      const row = [t.id, t.puerta, p, llegada, salida, totalMin, t.llave];
      CATEGORIES.forEach(c => { row.push(d[c.id]||0); });
      let dir = '';
      if (d.gericht) dir='Gericht';
      if (d.bont) dir= dir ? dir+'/BONT' : 'BONT';
      row.push(dir, t.firma_bo||'', t.firma_driver||'');
      rows.push(row);
    });
  });

  // Group by door: add totals row after each door
  const csvContent = [headers.join(';'), ...rows.map(r=>r.join(';'))].join('\n');

  // Download
  const blob = new Blob(['\ufeff'+csvContent], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Lostijden_BONT_'+dayDate+'.csv';
  a.click();
  URL.revokeObjectURL(url);

  if (confirm('✅ CSV descargado. ¿Abrir ahora en LibreOffice?')) {
    // Can't open directly from webapp
  }
}

function calcMinDiff(t1, t2) {
  const p = s => { const [h,m]=s.split(':'); return parseInt(h)*60+parseInt(m); };
  let d = p(t2) - p(t1);
  if (d < 0) d += 1440;
  return d;
}

// ============================================================
//  CONNECTION
// ============================================================
function setConn(mode, txt) {
  const dot = document.querySelector('.status-dot');
  const text = document.querySelector('.conn-stat span:last-child');
  if (dot) dot.className = 'status-dot '+mode;
  if (text) text.textContent = txt;
}

// ============================================================
//  POLLING (Firebase sync)
// ============================================================
function startPolling() {
  // Poll for trucks from encargado app
  setInterval(async () => {
    try {
      const resp = await fetch(DB_URL+'/camiones.json');
      const data = await resp.json();
      if (data) {
        let changed = false;
        Object.entries(data).forEach(([k,v]) => {
          if (v && v.activo) {
            if (!trucks[k] || JSON.stringify(trucks[k]) !== JSON.stringify(v)) {
              trucks[k] = v;
              changed = true;
            }
          }
        });
        if (changed) {
          localStorage.setItem('baysyncv2_trucks', JSON.stringify(trucks));
          if (currentTab === 'curso') renderTruckList();
          updateTruckBadge();
        }
      }
    } catch(e) {}
  }, 3000);

  // Poll for doors
  setInterval(async () => {
    try {
      const resp = await fetch(DB_URL+'/muelles.json');
      const v = await resp.json();
      if (v && v.doors && !dirty) {
        doorsState = v.doors; saveDoors(); renderDoors(); updateDoorUI();
      }
    } catch(e) {}
  }, 3000);
}

// ============================================================
//  BOOT
// ============================================================
init();
</script>
