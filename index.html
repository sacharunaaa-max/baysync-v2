<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BaySync V2 · BALIE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#fff;display:flex;flex-direction:column;user-select:none}
.header{background:#1a1a2e;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:6px}
.header .brand{font-size:15px;font-weight:700;text-align:center}
.header .brand span{color:#00e676}
.logo-hdr{height:22px;opacity:.7;flex-shrink:0}
.logo-hdr.intergamma{height:20px}
.settings-btn{background:0;border:none;color:#555;font-size:16px;cursor:pointer;padding:4px;flex-shrink:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.settings-btn:active{background:rgba(255,255,255,.1)}
.lang-btn{background:0;border:1px solid #444;color:#888;border-radius:6px;padding:3px 6px;font-size:10px;cursor:pointer;font-weight:600;flex-shrink:0}
.lang-btn.active{border-color:#00e676;color:#00e676;background:rgba(0,230,118,.1)}
.tab-bar{display:flex;background:#1a1a2e;border-top:1px solid #252540;flex-shrink:0}
.tab-btn{flex:1;padding:10px 2px;background:0;border:none;color:#666;font-size:10px;font-weight:600;cursor:pointer;transition:.15s;position:relative;text-align:center;line-height:1.2}
.tab-btn.active{color:#00e676;background:rgba(0,230,118,.08)}
.tab-btn.active::after{content:'';position:absolute;top:0;left:20%;width:60%;height:2px;background:#00e676;border-radius:2px}
.tab-btn .badge{background:#ff1744;color:#fff;font-size:8px;padding:1px 4px;border-radius:8px;margin-left:2px}
.content{flex:1;overflow-y:auto;padding:10px;display:block}
.content.hidden{display:none}
.door-view{font-size:10px;color:#555;text-align:center;padding:2px 0 6px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:480px;margin:0 auto}
.door{border-radius:12px;padding:14px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80px;border:2px solid transparent;background:#1e1e36;cursor:default}
.door .num{font-size:26px;font-weight:800;line-height:1.1}
.door .label{font-size:8px;text-transform:uppercase;letter-spacing:.8px;margin-top:2px;font-weight:600}
.door.libre{border-color:#00e676;background:#1a2e1a}.door.libre .num,.door.libre .label{color:#69f0ae}
.door.ocupado{border-color:#ff1744;background:#2e1a1a}.door.ocupado .num,.door.ocupado .label{color:#ff5252}
.door.parcial{border-color:#ffd740;background:#2e2a1a}.door.parcial .num,.door.parcial .label{color:#ffd740}
.form-card{background:#1e1e36;border-radius:12px;padding:14px;margin-bottom:10px;max-width:600px;margin-left:auto;margin-right:auto}
.form-card h3{font-size:13px;color:#00e676;margin-bottom:10px;font-weight:700}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-group{flex:1;min-width:70px}
.form-group label{display:block;font-size:9px;color:#888;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #333;background:#141428;color:#fff;font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#00e676}
.prov-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.prov-row .prov-input{flex:1;position:relative}
.prov-row .prov-input input{width:100%;padding:7px 10px;border-radius:8px;border:1px solid #333;background:#141428;color:#fff;font-size:12px;outline:none}
.prov-row .prov-input input:focus{border-color:#00e676}
.prov-row .btn-rm{background:#ff1744;border:none;color:#fff;width:26px;height:26px;border-radius:6px;font-size:14px;cursor:pointer;flex-shrink:0;font-weight:700}
.btn-add{background:0;border:1px dashed #444;color:#888;padding:6px;border-radius:6px;font-size:11px;cursor:pointer;width:100%;margin-bottom:8px}
.suggestions{position:absolute;top:100%;left:0;right:0;background:#1e1e36;border:1px solid #333;border-radius:0 0 8px 8px;max-height:140px;overflow-y:auto;z-index:10;display:none}
.suggestions.show{display:block}
.suggestions div{padding:6px 10px;font-size:11px;cursor:pointer;border-bottom:1px solid #252540;color:#ccc}
.suggestions div:hover{background:#00e67622;color:#fff}
.action-btns{display:flex;gap:6px;margin-top:4px}
.action-btns button{flex:1;padding:12px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .12s}
.action-btns button:active{opacity:.7}.action-btns button:disabled{opacity:.25;cursor:default}
.btn-descarga{background:#00e676;color:#111}.btn-espera{background:#ffd740;color:#111}
.wait-card{background:#1e1e36;border-radius:12px;padding:12px 14px;margin-bottom:8px;max-width:600px;margin-left:auto;margin-right:auto;border-left:3px solid #ffd740}
.wait-card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.wait-card .id{font-size:18px;font-weight:800;color:#ffd740}
.wait-card .prov{font-size:11px;color:#888;margin-bottom:4px;line-height:1.4}
.wait-card .time{font-size:10px;color:#666}
.wait-card .btn-asignar{width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;background:#00e676;color:#111;cursor:pointer;margin-top:6px}
.wait-card .btn-asignar:active{opacity:.7}
.truck-card{background:#1e1e36;border-radius:12px;padding:12px 14px;margin-bottom:8px;max-width:600px;margin-left:auto;margin-right:auto;border-left:3px solid #ffd740}
.truck-card.despatched{border-left-color:#00e676;opacity:.7}
.truck-card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.truck-card .id{font-size:18px;font-weight:800;color:#ffd740}
.truck-card.despatched .id{color:#00e676}
.truck-card .door{font-size:12px;color:#aaa;font-weight:600}
.truck-card .prov{font-size:11px;color:#888;margin-bottom:4px}
.truck-card .time{font-size:10px;color:#666}
.truck-card .sb{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.truck-card .sb-c{background:#ffd74022;color:#ffd740;border:1px solid #ffd740}
.truck-card .sb-d{background:#00e67622;color:#00e676;border:1px solid #00e676}
.truck-act{display:flex;gap:6px;margin-top:6px}
.truck-act button{flex:1;padding:8px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer}
.truck-act .btn-disp{background:#ffd740;color:#111}.truck-act .btn-view{background:#333;color:#ccc}
.empty-state{text-align:center;padding:40px 20px;color:#555;font-size:13px}
.day-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;flex-shrink:0;background:#1a1a2e;border-top:1px solid #252540;gap:8px}
.day-status{font-size:11px;font-weight:600}
.day-status.open{color:#00e676}.day-status.closed{color:#ff5252}
/* day buttons now inside settings modal via openSettings() */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#1e1e36;border-radius:14px;padding:16px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-size:14px;color:#00e676;margin-bottom:10px}
.close-modal{float:right;background:0;border:none;color:#888;font-size:22px;cursor:pointer}
.firma-input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#141428;color:#fff;font-size:14px;outline:none;margin:6px 0}
@media(max-width:380px){.door{min-height:68px;padding:8px 4px}.door .num{font-size:22px}.tab-btn{font-size:9px;padding:8px 2px}.form-row{gap:5px}.form-group{min-width:60px}}
</style>
</head>

</div>

    <button class="btn-add" id="btnAddProv"></button>
    <div class="form-group" style="margin-bottom:8px">
      <label style="display:block;font-size:10px;color:#888;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px" id="lblMotivo"></label>

    </div>
    <div class="action-btns">
      <button class="btn-descarga" id="btnDescarga" disabled></button>
      <button class="btn-espera" id="btnEspera" disabled></button>
    </div>
  </div>
</div>
<div class="content hidden" id="tabEspera"><div id="waitList"></div></div>
<div class="content hidden" id="tabCurso"><div id="truckList"></div></div>

<div class="tab-bar" id="tabBar"></div>

<div class="day-bar">
  <div>

</div>

<div class="modal-overlay" id="modalOv"><div class="modal" id="modalContent"></div></div>

  document.getElementById('lblDoor').textContent=t('lblDoor');document.getElementById('lblDoor2').textContent=t('lblDoor2');
  document.getElementById('lblKey').textContent=t('lblKey');document.getElementById('inpKey').placeholder=t('placeholderKey');
  document.getElementById('lblSuppliers').textContent=t('lblSuppliers');document.getElementById('btnAddProv').textContent=t('addProv');
  // Re-populate prov placeholders
  document.querySelectorAll('.pa').forEach(el=>el.placeholder=t('addProv').replace('+ ',''));
  document.getElementById('lblMotivo').textContent=t('lblMotivo');
  const sm=document.getElementById('inpMotivo');sm.innerHTML='<option value="">'+t('noMotivo')+'</option>';
  WAIT_REASONS.forEach(r=>{const o=document.createElement('option');o.value=r.val;o.textContent=r[cl]||r.es;sm.appendChild(o);});
  document.getElementById('btnDescarga').textContent=t('btnDescarga');
  document.getElementById('btnEspera').textContent=t('btnEspera');
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===cl));
  renderD(doorsState);renderW();renderT();
  if(currentTab)switchTab(currentTab,true);
}
let currentTab='muelles';
function switchTab(t,force){currentTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector(`.tab-btn[data-t="${t}"]`);if(btn)btn.classList.add('active');
  document.querySelectorAll('.content').forEach(c=>c.classList.add('hidden'));
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
  if(t==='espera')renderW();if(t==='curso')renderT();}

// ============================ INIT ============================
function init(){
  try{const s=localStorage.getItem(LANG_KEY);if(s)cl=s;}catch(e){}
  try{const s=localStorage.getItem(DAY_KEY);if(s){const d=JSON.parse(s);open=d.open;date=d.date}}catch(e){}
  try{const s=localStorage.getItem(TRUCK_KEY);trucks=s?JSON.parse(s):{}}catch(e){}
  const s1=document.getElementById('inpDoor'),s2=document.getElementById('inpDoor2');
  DOORS.forEach(d=>{s1.innerHTML+=`<option value="${d}">${d}</option>`;s2.innerHTML+=`<option value="${d}">${d}</option>`});
  setupProv();
  applyLang();
  renderD({});updDay();renderW();renderT();poll();
  document.getElementById('btnDescarga').onclick=()=>regT(false);
  document.getElementById('btnEspera').onclick=()=>regT(true);
  document.getElementById('inpMotivo').onchange=chk;
}

function setupProv(){
  document.getElementById('btnAddProv').onclick=()=>addP();addP();
  document.getElementById('inpId').oninput=chk;document.getElementById('inpDoor').onchange=chk;document.getElementById('inpKey').oninput=chk;
}
function addP(v){
  const c=document.getElementById('provList'),idx=pCnt++;const r=document.createElement('div');r.className='prov-row';
  r.innerHTML=`<span style="color:#888;font-size:10px;width:16px;flex-shrink:0;text-align:center">#${idx}</span><div class="prov-input"><input type="text" class="pa" placeholder="" value="${v||''}" autocomplete="off"><div class="suggestions"></div></div><button class="btn-rm" onclick="rmP(this)">✕</button>`;
  c.appendChild(r);const i=r.querySelector('.pa'),sg=r.querySelector('.suggestions');
  if(!v)i.placeholder=t('addProv').replace('+ ','');
  i.oninput=function(){const q=this.value.toLowerCase().trim();sg.innerHTML='';if(q){const m=SUP.filter(x=>x.toLowerCase().includes(q));if(m.length){m.forEach(x=>{const d=document.createElement('div');d.textContent=x;d.onclick=()=>{i.value=x;sg.classList.remove('show');chk();};sg.appendChild(d)});sg.classList.add('show');}}chk();};
  i.onblur=()=>setTimeout(()=>sg.classList.remove('show'),200);
  i.onfocus=function(){if(this.value.trim())this.dispatchEvent(new Event('input'));};
  if(!v)i.focus();chk();
}
function rmP(b){b.closest('.prov-row').remove();chk();}
function chk(){
  const id=document.getElementById('inpId').value.trim(),keys=document.getElementById('inpKey').value.trim(),
    hasProv=[...document.querySelectorAll('.pa')].some(p=>p.value.trim()),hasDoor=document.getElementById('inpDoor').value;
  document.getElementById('btnDescarga').disabled=!(open&&id&&hasProv&&hasDoor&&keys);
  document.getElementById('btnEspera').disabled=!(open&&id&&hasProv);
}
async function regT(espera){
  const id=document.getElementById('inpId').value.trim().padStart(2,'0');
  const puerta=espera?null:parseInt(document.getElementById('inpDoor').value);
  const puerta2=!espera&&document.getElementById('inpDoor2').value?parseInt(document.getElementById('inpDoor2').value):null;
  const llave=document.getElementById('inpKey').value.trim();
  const provs=[...document.querySelectorAll('.pa')].map(p=>p.value.trim()).filter(Boolean);
  if(!id||!provs.length)return;
  if(!espera&&!puerta)return;
  const motivo=espera?document.getElementById('inpMotivo').value:'';
  if(espera&&!motivo){alert(t('selectReason'));return;}
  const llega=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const truck={id,puerta,puerta2,llave,proveedores:provs,creado:Date.now(),llegada:llega,
    activo:!espera,espera,motivo,completado:false,despachado:false,
    descargas:{},firma_encargado:'',salida:null,llave_devuelta:false,fecha:date};
  provs.forEach((_,i)=>{truck.descargas[i]={proveedor:provs[i],gericht:false,bont:false};CAT.forEach(c=>truck.descargas[i][c.id]=0);});
  if(navigator.onLine)try{await fetch(DB+'/camiones/'+id+'.json',{method:'PUT',body:JSON.stringify(truck)})}catch(e){}
  trucks[id]=truck;saveT();renderW();renderT();badges();
  if(!espera){const du={};du[puerta]='ocupado';if(puerta2)du[puerta2]='ocupado';try{await fetch(DB+'/muelles/doors.json',{method:'PATCH',body:JSON.stringify(du)})}catch(e){}}
  document.getElementById('inpId').value='';document.getElementById('inpDoor').value='';document.getElementById('inpDoor2').value='';document.getElementById('inpKey').value='';document.getElementById('inpMotivo').value='';document.getElementById('provList').innerHTML='';pCnt=0;addP();chk();
}

// ============================ DOORS ============================
function renderD(state){
  const lb={libre:'🟢 '+t('libre').replace('🟢 ',''),ocupado:'🔴 '+t('ocupado').replace('🔴 ',''),parcial:'🟡 '+t('parcial').replace('🟡 ','')};
  document.getElementById('doorGrid').innerHTML=DOORS.map(d=>{const st=state[d]||'libre';return `<div class="door ${st}"><div class="num">${d}</div><div class="label">${lb[st]}</div></div>`}).join('');
}

// ============================ DAY ============================
function updDay(){
  const ds=document.getElementById('dayStatus'),dd=document.getElementById('dayDate');
  if(open){ds.className='day-status open';ds.textContent=t('dayOpen')+' — '+date;dd.textContent='';}
  else{ds.className='day-status closed';ds.textContent=t('dayClosed');dd.textContent=t('dayStart');}
}
function openDay(){const t2=new Date().toISOString().split('T')[0];open=true;date=t2;saveD();updDay();fetch(DB+'/dia.json',{method:'PUT',body:JSON.stringify({abierto:true,fecha:t2})}).catch(()=>{});chk();}
function closeDay(){open=false;saveD();updDay();fetch(DB+'/dia.json',{method:'PUT',body:JSON.stringify({abierto:false,fecha:date})}).catch(()=>{});document.getElementById('btnDescarga').disabled=true;document.getElementById('btnEspera').disabled=true;}
function openSettings(){
  const m=document.getElementById('modalContent');
  m.innerHTML=`<button class="close-modal" onclick="closeM()">&times;</button>
    <h3>${t('settingsTitle')}</h3>
    <p style="font-size:12px;color:#888;margin-bottom:10px">${t(open?'dayOpen':'dayClosed')}${date?' — '+date:''}</p>
    <button class="btn-pri" style="background:#00e676;color:#111" onclick="closeM();openDay()">${t('openBtn')}</button>
    <button class="btn-pri" style="background:#ff1744" onclick="closeM();closeDay()">${t('closeBtn')}</button>
    <button class="btn-pri" style="background:#333" onclick="closeM();expCSV()">${t('exportBtn')}</button>
    <button class="btn-pri" style="background:#333;margin-top:10px" onclick="closeM()">${t('cancel')}</button>`;
  document.getElementById('modalOv').classList.add('show');
}
function saveD(){localStorage.setItem(DAY_KEY,JSON.stringify({open,date}))}
function saveT(){localStorage.setItem(TRUCK_KEY,JSON.stringify(trucks))}
function badges(){const bE=document.getElementById('badgeE'),bC=document.getElementById('badgeC');if(bE)bE.textContent=Object.values(trucks).filter(t=>t.espera).length;if(bC)bC.textContent=Object.values(trucks).filter(t=>t.activo&&!t.despachado).length;}

// ============================ ESPERA ============================
function renderW(){
  const l=document.getElementById('waitList'),w=Object.values(trucks).filter(t=>t.espera);
  if(!w.length){l.innerHTML='<div class="empty-state">'+t('waitEmpty')+'</div>';badges();return;}
  let h='<div style="font-size:11px;color:#ffd740;font-weight:700;margin-bottom:6px">'+t('waitSection')+' ('+w.length+')</div>';
  w.sort((x,y)=>x.creado-y.creado).forEach(tk=>{
    const p=tk.proveedores.slice(0,3).join(', ')+(tk.proveedores.length>3?' +'+(tk.proveedores.length-3):'');
    const motivoTxt=tk.motivo?(()=>{const r=WAIT_REASONS.find(x=>x.val===tk.motivo);return r?r[cl]||r.es:tk.motivo})():(void 0);
    h+=`<div class="wait-card"><div class="head"><div class="id">🚛 #${tk.id}</div><div style="font-size:10px;color:#666;font-weight:400">🕐 ${tk.llegada}</div></div><div class="prov">📦 ${p}</div><div class="time" style="margin-bottom:2px">🔑 ${tk.llave}</div>${motivoTxt?'<div style="font-size:10px;color:#ffd740;margin-bottom:4px">⚠️ '+motivoTxt+'</div>':''}<button class="btn-asignar" onclick="asignarPuerta('${tk.id}')">${t('assignBtn')}</button></div>`;
  });
  l.innerHTML=h;badges();
}
function asignarPuerta(id){
  const tk=trucks[id];if(!tk)return;
  const m=document.getElementById('modalContent');
  m.innerHTML=`<button class="close-modal" onclick="closeM()">&times;</button>
    <h3>${t('assDoor')} #${id}</h3><p style="font-size:12px;color:#888;margin-bottom:8px">${t('selDoor')}</p>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">
      ${DOORS.map(d=>{const st=doorsState[d]||'libre';return `<button class="btn-pri" style="background:#1e1e36;border:2px solid ${st==='libre'?'#00e676':st==='ocupado'?'#ff1744':'#ffd740'};color:${st==='libre'?'#00e676':st==='ocupado'?'#ff5252':'#ffd740'}" onclick="confAsignar('${id}',${d})">${t('puerta')} ${d} ${st==='libre'?'🟢':st==='ocupado'?'🔴':'🟡'} ${st.toUpperCase()}</button>`}).join('')}
    </div><button class="btn-pri" style="background:#ff1744;margin-top:4px" onclick="closeM()">${t('cancel')}</button>`;
  document.getElementById('modalOv').classList.add('show');
}
async function confAsignar(id,puerta){
  const tk=trucks[id];if(!tk)return;
  tk.puerta=puerta;tk.puerta2=null;tk.espera=false;tk.activo=true;
  trucks[id]=tk;saveT();renderW();renderT();badges();
  if(navigator.onLine)try{await fetch(DB+'/camiones/'+id+'.json',{method:'PUT',body:JSON.stringify(tk)})}catch(e){}
  const du={};du[puerta]='ocupado';try{await fetch(DB+'/muelles/doors.json',{method:'PATCH',body:JSON.stringify(du)})}catch(e){}
  closeM();
}

// ============================ EN CURSO ============================
function renderT(){
  const l=document.getElementById('truckList'),a=Object.values(trucks).filter(t=>t.activo&&!t.despachado),d=Object.values(trucks).filter(t=>t.despachado);
  if(!a.length&&!d.length){l.innerHTML='<div class="empty-state">'+t('cursoEmpty')+'</div>';badges();return;}
  let h='';
  if(a.length){h+='<div style="font-size:11px;color:#ffd740;font-weight:700;margin-bottom:6px">'+t('cursoSection')+' ('+a.length+')</div>';a.sort((x,y)=>x.creado-y.creado).forEach(tk=>h+=card(tk,false));}
  if(d.length){h+='<div style="font-size:11px;color:#00e676;font-weight:700;margin:10px 0 6px">'+t('despSection')+' ('+d.length+')</div>';d.sort((x,y)=>x.creado-y.creado).forEach(tk=>h+=card(tk,true));}
  l.innerHTML=h;
  document.querySelectorAll('.btn-v').forEach(b=>b.onclick=function(){openModal(this.dataset.id)});
  document.querySelectorAll('.btn-d').forEach(b=>b.onclick=function(){openDisp(this.dataset.id)});badges();
}
function card(tk,des){
  const p=tk.proveedores.slice(0,3).join(', ')+(tk.proveedores.length>3?' +'+(tk.proveedores.length-3):'');
  const ac=!des?`<div class="truck-act">${!tk.completado?'<button class="btn-view btn-v" data-id="'+tk.id+'">'+t('viewBtn')+'</button>':'<button class="btn-disp btn-d" data-id="'+tk.id+'">'+t('dispatchBtn')+'</button>'}</div>`
    :`<div class="truck-act"><button class="btn-view btn-v" data-id="${tk.id}">${t('viewBtn')}</button></div>`;
  return `<div class="truck-card ${des?'despatched':''}"><div class="head"><div><span class="sb ${des?'sb-d':'sb-c'}">${des?t('badgeDesp'):t('badgeInside')}</span></div><div class="id">#${tk.id}</div></div><div class="door">🚪 ${tk.puerta}${tk.puerta2?' + '+tk.puerta2:''} · 🔑 ${tk.llave}</div><div class="prov">📦 ${p}</div><div class="time">🕐 ${t('arrived')}: ${tk.llegada||'--:--'}${tk.salida?' · '+t('departed')+': '+tk.salida:''}</div>${ac}</div>`;
}
function openModal(id){
  const tk=trucks[id];if(!tk)return;const m=document.getElementById('modalContent');let ph='';
  tk.proveedores.forEach((p,i)=>{const d=tk.descargas[i]||{};ph+=`<div style="margin:8px 0;padding:8px;background:#141428;border-radius:8px"><div style="font-weight:700;font-size:13px;color:#fff;margin-bottom:4px">${p}</div><div style="font-size:10px;color:#888;display:flex;gap:6px;flex-wrap:wrap">${CAT.map(c=>`<span>${c.short}: <b style="color:#fff">${d[c.id]||0}</b></span>`).join(' | ')}</div><div style="font-size:10px;margin-top:3px;color:#aaa">${d.gericht?'→ Gericht ':''}${d.bont?'→ BONT':''}</div></div>`;});
  m.innerHTML=`<button class="close-modal" onclick="closeM()">&times;</button><h3>🚛 #${tk.id}</h3><div style="font-size:12px;color:#888;margin-bottom:8px">${tk.espera?'⏳ '+(t('waitEmpty').replace('⏳ ',''))+' · Sin puerta':('🚪 '+tk.puerta+(tk.puerta2?' + '+tk.puerta2:'')+' · 🔑 '+tk.llave)} · 🕐 ${tk.llegada||'--:--'}</div>${ph}<div style="font-size:11px;color:#888;margin-top:8px">${t('firmaEnc')}: <b style="color:#fff">${tk.firma_encargado||t('pending')}</b></div>${tk.completado?'<div style="font-size:11px;color:#00e676;margin-top:4px">'+t('completed')+'</div>':''}${tk.salida?'<div style="font-size:11px;color:#888;margin-top:4px">🕐 '+t('departed')+': '+tk.salida+' · 🔑 '+(tk.llave_devuelta?t('returned'):t('keyPending2'))+'</div>':''}${tk.despachado?'<div style="font-size:11px;color:#00e676;margin-top:4px">'+t('badgeDesp')+'</div>':''}<button class="btn-pri" style="margin-top:10px" onclick="closeM()">${t('close')}</button>`;
  document.getElementById('modalOv').classList.add('show');
}
function openDisp(id){
  const tk=trucks[id];if(!tk)return;const m=document.getElementById('modalContent');
  m.innerHTML=`<button class="close-modal" onclick="closeM()">&times;</button><h3>🔑 ${t('dispatchBtn')} #${tk.id}</h3><p style="font-size:12px;color:#888;margin-bottom:10px">${t('firmaForm')}</p>
    <div class="form-group" style="margin-bottom:8px"><label style="font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px">🔑 ${t('keyReturned')} ${tk.llave}?</label><select id="keyR" style="width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#141428;color:#fff;font-size:14px;outline:none;margin-top:4px"><option value="si">${t('keyYes')}</option><option value="no">${t('keyNo')}</option></select></div>
    <div><div style="font-size:11px;color:#aaa;margin-bottom:4px">${t('firmaForm')}:</div><input class="firma-input" id="firmaBo" placeholder="${t('signBo')}"><input class="firma-input" id="firmaDriver" placeholder="${t('signDriver')}"></div>
    <button class="btn-pri" id="btnConf" style="background:#ffd740;color:#111">${t('confirmDesp')}</button>
    <button class="btn-pri" style="background:#ff1744;margin-top:6px" onclick="closeM()">${t('cancel')}</button>`;
  document.getElementById('modalOv').classList.add('show');
  document.getElementById('btnConf').onclick=()=>{
    tk.salida=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});tk.llave_devuelta=document.getElementById('keyR').value==='si';
    tk.despachado=true;tk.firma_bo=document.getElementById('firmaBo').value.trim()||'('+t('pending')+')';tk.firma_driver=document.getElementById('firmaDriver').value.trim()||'('+t('pending')+')';
    const du={};du[tk.puerta]='libre';if(tk.puerta2)du[tk.puerta2]='libre';
    fetch(DB+'/muelles/doors.json',{method:'PATCH',body:JSON.stringify(du)}).catch(()=>{});
    trucks[id]=tk;saveT();if(navigator.onLine)fetch(DB+'/camiones/'+id+'.json',{method:'PUT',body:JSON.stringify(tk)}).catch(()=>{});
    closeM();renderT();
  };
}
function closeM(){document.getElementById('modalOv').classList.remove('show');}

// ============================ EXPORT ============================
function expCSV(){
  const rows=Object.values(trucks).filter(t=>t.fecha===date&&!t.espera);
  if(!rows.length){alert(t('noData'));return;}
  const h=['ID','Puerta','Proveedor','Llegada','Salida','Total min','Llave'];CAT.forEach(c=>h.push(c.short));h.push('Dirección','Firma Bo','Firma Driver');
  const csv=rows.map(t=>t.proveedores.map((p,i)=>{const d=t.descargas[i]||{};let min='';if(t.llegada&&t.salida){const[l1,l2]=t.llegada.split(':').map(Number);const[s1,s2]=t.salida.split(':').map(Number);let m=s2+s1*60-(l2+l1*60);if(m<0)m+=1440;min=m;}const dir=(d.gericht?'Gericht':'')+(d.gericht&&d.bont?'/':'')+(d.bont?'BONT':'');return[t.id,t.puerta,p,t.llegada||'',t.salida||'',min,t.llave,...CAT.map(c=>d[c.id]||0),dir,t.firma_bo||'',t.firma_driver||''].join(';')}).join('\n')).join('\n');
  const blob=new Blob(['\ufeff'+[h.join(';'),csv].join('\n')],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Lostijden_BONT_'+date+'.csv';a.click();URL.revokeObjectURL(a);
}

// ============================ POLL ============================
function poll(){
  setInterval(async()=>{try{const r=await fetch(DB+'/muelles.json');const d=await r.json();if(d&&d.doors){doorsState=d.doors||{};renderD(doorsState);renderW();}}catch(e){}},2000);
  setInterval(async()=>{try{const r=await fetch(DB+'/camiones.json');const d=await r.json();if(d){let c=0;Object.entries(d).forEach(([k,v])=>{if(v&&(v.activo||v.espera)&&(!trucks[k]||JSON.stringify(trucks[k])!==JSON.stringify(v))){trucks[k]=v;c=1}});if(c){saveT();renderW();renderT();badges()}}}catch(e){}},3000);
}
init();
</script>
</body>
