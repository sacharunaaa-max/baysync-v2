<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BaySync V2 · Almacén</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0f0f1a;color:#fff;display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none;touch-action:manipulation
}

.header{background:#1a1a2e;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.header .brand{font-size:15px;font-weight:700;text-align:center}
.header .brand span{color:#7c4dff}
.logo-hdr{height:24px;opacity:.7;flex-shrink:0}
.logo-hdr.intergamma{height:22px}
.conn-stat{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-dot.online{background:#00e676;box-shadow:0 0 4px #00e676}
.status-dot.offline{background:#ff5252}

.tab-bar{display:flex;background:#1a1a2e;border-top:1px solid #252540;flex-shrink:0}
.tab-btn{flex:1;padding:10px 3px;background:0;border:none;color:#666;font-size:10px;font-weight:600;cursor:pointer;transition:.15s;position:relative;text-align:center;line-height:1.2}
.tab-btn.active{color:#7c4dff;background:rgba(124,77,255,.08)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:25%;width:50%;height:2px;background:#7c4dff;border-radius:2px}
.tab-btn .badge{background:#ff1744;color:#fff;font-size:8px;padding:1px 4px;border-radius:8px}
.tab-count{font-size:8px;opacity:.6;display:block;margin-top:1px}

.content{flex:1;overflow-y:auto;padding:8px;display:block}
.content.hidden{display:none}

/* TAB 1: DOORS - tap to toggle */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%;max-width:420px;margin:0 auto}
.door{position:relative;border-radius:10px;padding:12px 6px;text-align:center;cursor:pointer;transition:transform .08s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:72px;border:2px solid transparent;background:#1e1e36}
.door:active{transform:scale(.92)}
.door .num{font-size:24px;font-weight:800;line-height:1.1}
.door .label{font-size:8px;text-transform:uppercase;letter-spacing:.8px;margin-top:2px;font-weight:600}
.door.libre{border-color:#00e676;background:#1a2e1a}
.door.libre .num,.door.libre .label{color:#69f0ae}
.door.ocupado{border-color:#ff1744;background:#2e1a1a}
.door.ocupado .num,.door.ocupado .label{color:#ff5252}
.door.parcial{border-color:#ffd740;background:#2e2a1a}
.door.parcial .num,.door.parcial .label{color:#ffd740}
.door .badge{position:absolute;top:-3px;right:-3px;font-size:6px;padding:1px 4px;border-radius:8px;background:#ffd740;color:#111;display:none}
.door.dirty .badge{display:block}
.btn-send{width:100%;max-width:420px;margin:8px auto 0;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;background:#7c4dff;color:#fff;cursor:pointer;transition:opacity .12s;display:block}
.btn-send:active{opacity:.7}
.btn-send:disabled{opacity:.25;cursor:default}
.btn-send .sub{display:block;font-size:8px;font-weight:400;opacity:.7;margin-top:1px}

/* TAB 2: REGISTRO */
.form-card{background:#1e1e36;border-radius:10px;padding:12px;margin-bottom:8px;max-width:500px;margin-left:auto;margin-right:auto}
.form-card h3{font-size:12px;color:#7c4dff;margin-bottom:8px;font-weight:700}
.form-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.form-group{flex:1;min-width:70px}
.form-group label{display:block;font-size:9px;color:#888;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:7px 8px;border-radius:6px;border:1px solid #333;background:#141428;color:#fff;font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#7c4dff}
.prov-row{display:flex;gap:4px;align-items:center;margin-bottom:4px}
.prov-row .prov-input{flex:1;position:relative}
.prov-row .prov-input input{width:100%;padding:7px 8px;border-radius:6px;border:1px solid #333;background:#141428;color:#fff;font-size:12px;outline:none}
.prov-row .prov-input input:focus{border-color:#7c4dff}
.prov-row .btn-rm{background:#ff1744;border:none;color:#fff;width:26px;height:26px;border-radius:6px;font-size:14px;cursor:pointer;flex-shrink:0;font-weight:700}
.btn-add{background:0;border:1px dashed #444;color:#888;padding:6px;border-radius:6px;font-size:11px;cursor:pointer;width:100%;margin-bottom:6px}
.suggestions{position:absolute;top:100%;left:0;right:0;background:#1e1e36;border:1px solid #333;border-radius:0 0 6px 6px;max-height:140px;overflow-y:auto;z-index:10;display:none}
.suggestions.show{display:block}
.suggestions div{padding:6px 8px;font-size:11px;cursor:pointer;border-bottom:1px solid #252540;color:#ccc}
.suggestions div:hover{background:#7c4dff22;color:#fff}

/* TAB 3: CAMIONES */
.truck-card{background:#1e1e36;border-radius:10px;padding:10px 12px;margin-bottom:6px;border-left:4px solid #7c4dff;max-width:500px;margin-left:auto;margin-right:auto}
.truck-card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.truck-card .id{font-size:18px;font-weight:800;color:#7c4dff}
.truck-card .door{font-size:12px;color:#aaa;font-weight:600}
.truck-card .prov{font-size:10px;color:#888;margin-bottom:4px;line-height:1.3}
.truck-card .time{font-size:9px;color:#666}
.truck-card .btn-open{width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;background:#7c4dff;color:#fff;cursor:pointer;margin-top:4px}
.truck-card .btn-open:active{opacity:.7}
.truck-card.done{border-left-color:#00e676;opacity:.7}
.truck-card.done .id{color:#00e676}

.btn-pri{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:700;background:#7c4dff;color:#fff;cursor:pointer;margin-top:4px}
.btn-pri:active{opacity:.7}
.btn-pri:disabled{opacity:.25;cursor:default}
.btn-grn{background:#00e676;color:#111}
.btn-redd{background:#ff1744;color:#fff}

.empty-state{text-align:center;padding:40px 16px;color:#555;font-size:13px;line-height:1.5}
.empty-state .icon{font-size:32px;margin-bottom:8px}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:8px}
.modal-overlay.show{display:flex}
.modal{background:#1e1e36;border-radius:12px;padding:14px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:14px;color:#7c4dff;margin-bottom:6px}
.close-modal{float:right;background:0;border:none;color:#888;font-size:22px;cursor:pointer;line-height:1}
.prov-section{background:#141428;border-radius:8px;padding:8px;margin-bottom:6px}
.prov-section h4{font-size:12px;color:#fff;margin-bottom:4px}
.dir-btn{flex:1;padding:5px;border-radius:5px;border:1px solid #333;background:0;color:#888;font-size:10px;font-weight:600;cursor:pointer}
.dir-btn.active{background:#7c4dff22;border-color:#7c4dff;color:#7c4dff}
.qty-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.qty-item{background:#1e1e36;border-radius:6px;padding:4px 3px;text-align:center}
.qty-item label{display:block;font-size:7px;color:#888;text-transform:uppercase;letter-spacing:.2px;margin-bottom:1px}
.qty-item input{width:100%;padding:5px;border-radius:4px;border:1px solid #333;background:#0f0f1a;color:#fff;font-size:14px;font-weight:700;text-align:center;outline:none}
.qty-item input:focus{border-color:#7c4dff}
.firma-input{width:100%;padding:8px;border-radius:6px;border:1px solid #333;background:#141428;color:#fff;font-size:13px;outline:none;margin:4px 0}
.send-ok{text-align:center;padding:16px;color:#00e676;font-size:13px;font-weight:600}

@media(max-width:380px){
  .door{min-height:62px;padding:8px 3px}
  .door .num{font-size:20px}
  .qty-grid{grid-template-columns:repeat(2,1fr)}
  .tab-btn{font-size:9px;padding:7px 2px}
}
</style>
</head>
<body>

<div class="header">
  <img class="logo-hdr intergamma" src="intergamma-logo.svg" alt="Intergamma">
  <div class="brand">📋 <span>BaySync</span> · Almacén</div>
  <div class="conn-stat"><span class="status-dot offline" id="sDot"></span><span id="sTxt">---</span></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-t="muelles">🚪 Puertas<span class="tab-count">Tocar</span></button>
  <button class="tab-btn" data-t="registro">📝 Ingreso<span class="tab-count">Registrar</span></button>
  <button class="tab-btn" data-t="camiones">📦 Camiones<span class="badge" id="badgeCam">0</span><span class="tab-count">Activos</span></button>
</div>

<div class="content" id="tabMuelles">
  <div class="grid" id="doorGrid"></div>
  <button class="btn-send" id="btnSend" disabled>
    📤 Enviar estado <span class="sub" id="sendSub">Toca las puertas para cambiar</span>
  </button>
</div>

<div class="content hidden" id="tabRegistro">
  <div class="form-card">
    <h3>📥 Registrar camión entrante</h3>
    <div class="form-row">
      <div class="form-group" style="min-width:60px"><label>ID</label><input type="text" id="inpId" placeholder="01" inputmode="numeric" maxlength="4"></div>
      <div class="form-group" style="min-width:70px"><label>Puerta</label><select id="inpDoor"><option value="">—</option></select></div>
      <div class="form-group" style="min-width:60px"><label>2ª</label><select id="inpDoor2"><option value="">—</option></select></div>
      <div class="form-group" style="min-width:60px"><label>🔑 Llave</label><input type="text" id="inpKey" placeholder="B3" maxlength="6"></div>
    </div>
    <label style="display:block;font-size:9px;color:#888;margin-bottom:3px;font-weight:600;text-transform:uppercase">Proveedores</label>
    <div id="provList"></div>
    <button class="btn-add" id="btnAddProv">+ Agregar proveedor</button>
    <button class="btn-pri btn-grn" id="btnRegTruck" disabled>📤 Registrar camión</button>
  </div>
</div>

<div class="content hidden" id="tabCamiones">
  <div id="truckList"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const DB='https://baysync-583a2-default-rtdb.europe-west1.firebasedatabase.app';
const SUPPLIERS=["Akzo Nobel Coatings","Akzo Belgie","Allibert","Batavia","Bison International","Black & Decker (NL)","Black & Decker (Ceva)","Brilliant AG","Calodar NV","Coram (Leadtimer)","Durieu","Eglo Verlichting Nederland BV","Electro Cirkel Retail B.V.","Electrolux Home Products","Eltra B.V. (Leadtimer)","EUROMAC","Gevavi Schoeisel B.V.","Gimeg Nederland BV","Graham & Brown","GROHE BELGIE NV/SA","GROHE NEDERLAND B.V.","Hansgrohe","Hugo Brennenstuhl","Karcher","Koopman International B.V.","Korver Holland B.V.","KPE Holland","LENCO","Lightmakers SNEL","LUCIDE","LUTEC","Makita Belgie N.V.","Makita Nederland B.V.","Martin Mathys","Mega Collections","Navstar","Noord West Nederland","Novatech NV","Pick Up International B.V.","Robert Bosch B.V.","Service Best International (Leadtimer)","SHI","Sigma Coatings","Signify Netherlands B.V.","Soudal N.V.","SPS de Steenbok","Suki International B.V.","Talen Tools","Tiger (Leadtimer)","Tristar Retouradres","V33 (DISTRILOG)","Van Loon Sealskin","Van Spijk Agenturen","Vepa Bins B.V.","Vliegenthart","Weber","Stipt","Vebon NV","Arvesta","Aqmos"].sort((a,b)=>a.localeCompare(b));
const CATEGORIES=[{id:'pallet_euro',short:'Euro'},{id:'rcn',short:'RCN'},{id:'ww_pallet',short:'WW'},{id:'hplt',short:'HPLT'},{id:'rotom',short:'Rotom'},{id:'rolcontainer',short:'RCG'},{id:'colli',short:'Colli'},{id:'krat',short:'Krat'},{id:'rek',short:'Rek'}];
const DOORS=[18,19,20,21,22,23,24,25,26];
const DK='baysyncv2_doors_enc',TK='baysyncv2_trucks';
let doors={},dirty=0,lastSent=null,trucks={},curTab='muelles',curTruck=null,provCnt=1;

function init(){
  loadD();loadT();initDoorsSel();setupProv();renderD();updBtn();renderT();poll();
  document.getElementById('btnSend').onclick=()=>{if(dirty)sendD();};
  document.getElementById('btnRegTruck').onclick=regTruck;
  document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.content').forEach(c=>c.classList.add('hidden'));
    document.getElementById('tab'+b.dataset.t.charAt(0).toUpperCase()+b.dataset.t.slice(1)).classList.remove('hidden');
    if(b.dataset.t==='camiones')renderT();
  });
}

function loadD(){try{const s=localStorage.getItem(DK);doors=s?JSON.parse(s):{};Object.keys(doors).length||loadDef();}catch(e){loadDef()}}
function loadDef(){doors={};DOORS.forEach(d=>doors[d]='libre');svD()}
function svD(){localStorage.setItem(DK,JSON.stringify(doors))}
function renderD(){
  const g=document.getElementById('doorGrid');
  g.innerHTML='';
  DOORS.forEach(d=>{
    const st=doors[d]||'libre',lb={libre:'🟢 Libre',ocupado:'🔴 Ocupado',parcial:'🟡 Parcial'};
    const el=document.createElement('div');el.className='door '+st;
    el.innerHTML=`<span class="badge">✏️</span><div class="num">${d}</div><div class="label">${lb[st]}</div>`;
    el.onclick=()=>{const c=doors[d]||'libre';doors[d]=c=='libre'?'ocupado':c=='ocupado'?'parcial':'libre';svD();dirty=1;renderD();updBtn();};
    g.appendChild(el);
  });
  document.querySelectorAll('#doorGrid .door').forEach(e=>e.classList.toggle('dirty',dirty));
}
function updBtn(){
  const b=document.getElementById('btnSend');b.disabled=!dirty;
  document.getElementById('sendSub').textContent=lastSent?'Último: '+lastSent+(dirty?' · Pendiente':''):dirty?'Hay cambios':'Toca puertas para cambiar';
}
async function sendD(){
  setS('syncing','Enviando...');
  try{await fetch(DB+'/muelles.json',{method:'PUT',body:JSON.stringify({doors:doors,sentAt:Date.now()})})}catch(e){}
  dirty=0;lastSent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});svD();renderD();updBtn();setS('online','OK');
}

function initDoorsSel(){
  const s1=document.getElementById('inpDoor'),s2=document.getElementById('inpDoor2');
  DOORS.forEach(d=>{s1.innerHTML+=`<option value="${d}">Puerta ${d}</option>`;s2.innerHTML+=`<option value="${d}">Puerta ${d}</option>`});
}
function setupProv(){document.getElementById('btnAddProv').onclick=()=>addP();addP();document.getElementById('inpId').oninput=chk;document.getElementById('inpDoor').onchange=chk;document.getElementById('inpKey').oninput=chk;}
function addP(v){
  const c=document.getElementById('provList'),idx=provCnt++;
  const r=document.createElement('div');r.className='prov-row';
  r.innerHTML=`<span style="color:#888;font-size:10px;width:16px;flex-shrink:0;text-align:center">#${idx}</span><div class="prov-input"><input type="text" class="pa" placeholder="Proveedor..." value="${v||''}" autocomplete="off"><div class="suggestions"></div></div><button class="btn-rm" onclick="rmP(this)">✕</button>`;
  c.appendChild(r);const i=r.querySelector('.pa'),s=r.querySelector('.suggestions');
  i.oninput=function(){const v=this.value.toLowerCase().trim();s.innerHTML='';if(!v){s.classList.remove('show');return;}
    const m=SUPPLIERS.filter(x=>x.toLowerCase().includes(v));if(!m.length){s.classList.remove('show');return;}
    m.forEach(x=>{const d=document.createElement('div');d.textContent=x;d.onclick=()=>{i.value=x;s.classList.remove('show');chk();};s.appendChild(d)});s.classList.add('show');};
  i.onblur=()=>setTimeout(()=>s.classList.remove('show'),200);
  i.onfocus=function(){if(this.value.trim())this.dispatchEvent(new Event('input'));};
  i.oninput=function(){chk();};if(!v)i.focus();chk();
}
function rmP(b){b.closest('.prov-row').remove();chk();}
function chk(){const ok=document.getElementById('inpId').value.trim()&&document.getElementById('inpDoor').value&&document.getElementById('inpKey').value.trim()&&[...document.querySelectorAll('.pa')].some(p=>p.value.trim());document.getElementById('btnRegTruck').disabled=!ok;}
async function regTruck(){
  const id=document.getElementById('inpId').value.trim().padStart(2,'0'),puerta=parseInt(document.getElementById('inpDoor').value),puerta2=document.getElementById('inpDoor2').value?parseInt(document.getElementById('inpDoor2').value):null,llave=document.getElementById('inpKey').value.trim(),provs=[...document.querySelectorAll('.pa')].map(p=>p.value.trim()).filter(Boolean);
  if(!id||!puerta||!llave||!provs.length)return;
  const t={id,puerta,puerta2,llave,proveedores:provs,creado:Date.now(),llegada:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),activo:true,completado:false,despachado:false,descargas:{},firma_encargado:'',salida:null,llave_devuelta:false,fecha:new Date().toISOString().split('T')[0]};
  provs.forEach((_,i)=>{t.descargas[i]={proveedor:provs[i],gericht:false,bont:false};CATEGORIES.forEach(c=>t.descargas[i][c.id]=0);});
  if(navigator.onLine)try{await fetch(DB+'/camiones/'+id+'.json',{method:'PUT',body:JSON.stringify(t)})}catch(e){}
  trucks[id]=t;localStorage.setItem(TK,JSON.stringify(trucks));updBadge();renderT();
  const du={};du[puerta]='ocupado';if(puerta2)du[puerta2]='ocupado';
  try{await fetch(DB+'/muelles/doors.json',{method:'PATCH',body:JSON.stringify(du)})}catch(e){}
  document.getElementById('inpId').value='';document.getElementById('inpDoor').value='';document.getElementById('inpDoor2').value='';document.getElementById('inpKey').value='';document.getElementById('provList').innerHTML='';provCnt=0;addP();chk();
}

function loadT(){try{const s=localStorage.getItem(TK);trucks=s?JSON.parse(s):{}}catch(e){trucks={}}}
function renderT(){
  const l=document.getElementById('truckList'),a=Object.values(trucks).filter(t=>t.activo&&!t.completado&&!t.despachado),c=Object.values(trucks).filter(t=>t.completado&&!t.despachado);
  if(!a.length&&!c.length){l.innerHTML='<div class="empty-state"><div class="icon">📭</div>No hay camiones activos<br>Registra uno en 📝 Ingreso</div>';updBadge();return;}
  let h='';
  if(a.length){h+='<div style="font-size:10px;color:#7c4dff;font-weight:700;margin-bottom:4px">🟣 PENDIENTES ('+a.length+')</div>';
    a.sort((x,y)=>y.creado-x.creado).forEach(t=>h+=tcard(t,0));}
  if(c.length){h+='<div style="font-size:10px;color:#00e676;font-weight:700;margin:8px 0 4px">✅ DESCARGADOS ('+c.length+')</div>';
    c.forEach(t=>h+=tcard(t,1));}
  l.innerHTML=h;
  document.querySelectorAll('.btn-op').forEach(b=>b.onclick=function(){const x=Object.values(trucks).find(t=>t.id===this.dataset.id);if(x)openF(x);});
  updBadge();
}
function tcard(t,d){
  const p=t.proveedores.slice(0,2).join(', ')+(t.proveedores.length>2?' +'+(t.proveedores.length-2):'');
  return `<div class="truck-card ${d?'done':''}"><div class="head"><div class="id">🚛 #${t.id}</div><div class="door">🚪 ${t.puerta}${t.puerta2?'/'+t.puerta2:''}</div></div>
    <div class="prov">📦 ${p}</div><div class="time">🕐 ${t.llegada||'--:--'} · 🔑 ${t.llave}</div>
    ${d?'<div style="text-align:center;color:#00e676;font-size:11px;font-weight:600">✅ Descargado</div>':'<button class="btn-open btn-op" data-id="'+t.id+'">📋 Registrar descarga</button>'}</div>`;
}
function updBadge(){document.getElementById('badgeCam').textContent=Object.values(trucks).filter(t=>t.activo&&!t.completado&&!t.despachado).length;}

function openF(t){
  curTruck=JSON.parse(JSON.stringify(t));
  const m=document.getElementById('modalContent');
  let h=`<button class="close-modal" onclick="closeM()">&times;</button><h3>🚛 Camión #${t.id} · Puerta ${t.puerta}</h3><p style="font-size:10px;color:#888;margin-bottom:6px">🕐 ${t.llegada||'--:--'} · 🔑 ${t.llave}</p>`;
  t.proveedores.forEach((p,i)=>{
    const d=curTruck.descargas[i]||{};
    h+=`<div class="prov-section"><h4>📦 ${p}</h4>
      <div style="display:flex;gap:4px;margin-bottom:4px">
        <button class="dir-btn ${d.gericht?'active':''}" onclick="tDir(${i},'gericht')">→ Gericht</button>
        <button class="dir-btn ${d.bont?'active':''}" onclick="tDir(${i},'bont')">→ BONT</button>
      </div>
      <div class="qty-grid">${CATEGORIES.map(c=>`<div class="qty-item"><label>${c.short}</label><input type="number" min="0" value="${d[c.id]||0}" oninput="upQ(${i},'${c.id}',this.value)"></div>`).join('')}</div></div>`;
  });
  h+=`<div style="margin:6px 0"><div style="font-size:10px;color:#aaa;margin-bottom:3px">Firma GC medewerker:</div><input class="firma-input" id="firmInp" placeholder="Tu nombre" value="${t.firma_encargado||''}"></div>
    <button class="btn-pri btn-grn" onclick="subD()">📤 Enviar descarga</button>
    <button class="btn-pri btn-redd" onclick="closeM()">Cancelar</button>`;
  m.innerHTML=h;document.getElementById('modalOverlay').classList.add('show');
}
function tDir(i,dir){if(!curTruck||!curTruck.descargas[i])return;curTruck.descargas[i][dir]=!curTruck.descargas[i][dir];
  document.querySelectorAll('.dir-btn').forEach(b=>{
    const m=((b.getAttribute('onclick')||'').match(/\d+/)?.[0]);if(m==i)b.classList.toggle('active',curTruck.descargas[i][dir]);
  });}
function upQ(i,c,v){if(curTruck&&curTruck.descargas[i])curTruck.descargas[i][c]=parseInt(v)||0;}
function closeM(){document.getElementById('modalOverlay').classList.remove('show');curTruck=null;}
async function subD(){
  if(!curTruck)return;const f=document.getElementById('firmInp').value.trim();if(!f){alert('Firma tu nombre');return;}
  curTruck.firma_encargado=f;curTruck.completado=true;curTruck.descarga_completa=Date.now();
  trucks[curTruck.id]={...curTruck};localStorage.setItem(TK,JSON.stringify(trucks));
  if(navigator.onLine)try{await fetch(DB+'/camiones/'+curTruck.id+'.json',{method:'PUT',body:JSON.stringify(curTruck)})}catch(e){}
  closeM();renderT();
  document.getElementById('modalContent').innerHTML=`<div class="send-ok">✅ Descarga #${curTruck.id} enviada</div>`;
  document.getElementById('modalOverlay').classList.add('show');setTimeout(()=>document.getElementById('modalOverlay').classList.remove('show'),2000);
}

function setS(m,t){const d=document.getElementById('sDot'),s=document.getElementById('sTxt');if(d)d.className='status-dot '+m;if(s)s.textContent=t;}
function poll(){
  setInterval(async()=>{try{const r=await fetch(DB+'/muelles.json');const d=await r.json();if(d&&d.doors&&!dirty){doors=d.doors;svD();renderD();updBtn();}}catch(e){};},3000);
  setInterval(async()=>{try{const r=await fetch(DB+'/camiones.json');const d=await r.json();if(d){let c=0;
    Object.entries(d).forEach(([k,v])=>{if(v&&v.activo&&!v.despachado&&(!trucks[k]||JSON.stringify(trucks[k].descargas)!==JSON.stringify(v.descargas)||trucks[k].completado!==v.completado)){trucks[k]=v;c=1;}});
    Object.keys(trucks).forEach(k=>{if(!d[k]||d[k].despachado){delete trucks[k];c=1;}});
    if(c){localStorage.setItem(TK,JSON.stringify(trucks));updBadge();if(curTab==='camiones')renderT();}
  }}catch(e){};setS('online','En vivo');},3000);
}
init();
</script>
</body>
