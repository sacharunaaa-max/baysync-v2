<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BaySync V2 · Almacén</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#fff;display:flex;flex-direction:column;user-select:none}
.header{background:#1a1a2e;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:6px}
.header .brand{font-size:13px;font-weight:700;text-align:center}
.header .brand span{color:#7c4dff}
.logo-hdr{height:20px;opacity:.7;flex-shrink:0}.logo-hdr.intergamma{height:18px}
.lang-btn{background:0;border:1px solid #444;color:#888;border-radius:5px;padding:2px 5px;font-size:9px;cursor:pointer;font-weight:600;flex-shrink:0}
.lang-btn.active{border-color:#7c4dff;color:#7c4dff;background:rgba(124,77,255,.1)}
.conn-stat{display:flex;align-items:center;gap:4px;font-size:9px;color:#888;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block}
.sdot.on{background:#00e676;box-shadow:0 0 4px #00e676}
.sdot.off{background:#ff5252}
.tab-bar{display:flex;background:#1a1a2e;border-top:1px solid #252540;flex-shrink:0}
.tab-btn{flex:1;padding:10px 3px;background:0;border:none;color:#666;font-size:10px;font-weight:600;cursor:pointer;transition:.15s;position:relative;text-align:center;line-height:1.2}
.tab-btn.active{color:#7c4dff;background:rgba(124,77,255,.08)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:25%;width:50%;height:2px;background:#7c4dff;border-radius:2px}
.tab-btn .badge{background:#ff1744;color:#fff;font-size:8px;padding:1px 4px;border-radius:8px}
.content{flex:1;overflow-y:auto;padding:8px;display:block}
.content.hidden{display:none}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%;max-width:420px;margin:0 auto}
.door{position:relative;border-radius:10px;padding:12px 6px;text-align:center;cursor:pointer;transition:transform .08s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:72px;border:2px solid transparent;background:#1e1e36}
.door:active{transform:scale(.92)}.door .num{font-size:24px;font-weight:800;line-height:1.1}
.door .label{font-size:8px;text-transform:uppercase;letter-spacing:.8px;margin-top:2px;font-weight:600}
.door.libre{border-color:#00e676;background:#1a2e1a}.door.libre .num,.door.libre .label{color:#69f0ae}
.door.ocupado{border-color:#ff1744;background:#2e1a1a}.door.ocupado .num,.door.ocupado .label{color:#ff5252}
.door.parcial{border-color:#ffd740;background:#2e2a1a}.door.parcial .num,.door.parcial .label{color:#ffd740}
.door .db{position:absolute;top:-3px;right:-3px;font-size:6px;padding:1px 4px;border-radius:8px;background:#ffd740;color:#111;display:none}
.door.dirty .db{display:block}
.btn-send{width:100%;max-width:420px;margin:8px auto 0;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;background:#7c4dff;color:#fff;cursor:pointer}
.btn-send:active{opacity:.7}.btn-send:disabled{opacity:.25;cursor:default}
.btn-send .sub{display:block;font-size:8px;font-weight:400;opacity:.7;margin-top:1px}
.truck-card{background:#1e1e36;border-radius:10px;padding:10px 12px;margin-bottom:6px;border-left:4px solid #7c4dff;max-width:500px;margin-left:auto;margin-right:auto}
.truck-card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.truck-card .id{font-size:18px;font-weight:800;color:#7c4dff}
.truck-card .door{font-size:12px;color:#aaa;font-weight:600}
.truck-card .prov{font-size:10px;color:#888;margin-bottom:4px;line-height:1.3}
.truck-card .time{font-size:9px;color:#666}
.truck-card .btn-op{width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;background:#7c4dff;color:#fff;cursor:pointer;margin-top:4px}
.truck-card .btn-op:active{opacity:.7}
.truck-card.done{border-left-color:#00e676;opacity:.7}.truck-card.done .id{color:#00e676}
.btn-pri{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:700;background:#7c4dff;color:#fff;cursor:pointer;margin-top:4px}
.btn-pri:active{opacity:.7}.btn-grn{background:#00e676;color:#111}.btn-redd{background:#ff1744;color:#fff}
.empty-state{text-align:center;padding:40px 16px;color:#555;font-size:13px;line-height:1.5}
.empty-state .icon{font-size:32px;margin-bottom:8px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:8px}
.modal-overlay.show{display:flex}
.modal{background:#1e1e36;border-radius:12px;padding:14px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:14px;color:#7c4dff;margin-bottom:6px}
.close-modal{float:right;background:0;border:none;color:#888;font-size:22px;cursor:pointer;line-height:1}
.prov-section{background:#141428;border-radius:8px;padding:8px;margin-bottom:6px}
.prov-section h4{font-size:12px;color:#fff;margin-bottom:4px}
.dir-btn{flex:1;padding:5px;border-radius:5px;border:1px solid #333;background:0;color:#888;font-size:10px;font-weight:600;cursor:pointer}
.dir-btn.active{background:#7c4dff22;border-color:#7c4dff;color:#7c4dff}
.qty-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.qty-item{background:#1e1e36;border-radius:6px;padding:4px 3px;text-align:center}
.qty-item label{display:block;font-size:7px;color:#888;text-transform:uppercase;letter-spacing:.2px;margin-bottom:1px}
.qty-item input{width:100%;padding:5px;border-radius:4px;border:1px solid #333;background:#0f0f1a;color:#fff;font-size:14px;font-weight:700;text-align:center;outline:none}
.qty-item input:focus{border-color:#7c4dff}
.firma-input{width:100%;padding:8px;border-radius:6px;border:1px solid #333;background:#141428;color:#fff;font-size:13px;outline:none;margin:4px 0}
.send-ok{text-align:center;padding:16px;color:#00e676;font-size:13px;font-weight:600}
@media(max-width:380px){.door{min-height:62px;padding:8px 3px}.door .num{font-size:20px}.qty-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="header">
  <img class="logo-hdr intergamma" src="intergamma-logo.svg" alt="Intergamma">
  <div class="brand" id="brandTitle">📋 <span>BaySync</span> · Almacén</div>
  <div style="display:flex;gap:2px;align-items:center">
    <button class="settings-btn" onclick="openSettings()" id="settingsBtn" title="Ajustes">⚙️</button>
    <div class="conn-stat"><span class="sdot off" id="sD"></span><span id="sT">---</span></div>
    <button class="lang-btn" data-lang="es" onclick="setLang('es')">ES</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="nl" onclick="setLang('nl')">NL</button>
  </div>
</div>

<div class="tab-bar" id="tabBar"></div>

<div class="content" id="tabMuelles">
  <div class="grid" id="doorGrid"></div>
  <button class="btn-send" id="btnSend" disabled>
    <span id="sendLabel"></span><span class="sub" id="sendSub"></span>
  </button>
</div>
<div class="content hidden" id="tabCamiones"><div id="truckList"></div></div>

<div class="modal-overlay" id="modalOv"><div class="modal" id="modalContent"></div></div>

<script>
// ============================ i18n ============================
const LANG={
  es:{title:'📋 BaySync · Almacén',brand:'📋 <span>BaySync</span> · Almacén',
    tabs:['🚪 Puertas','📦 Camiones'],
    libre:'🟢 Libre',ocupado:'🔴 Ocupado',parcial:'🟡 Parcial',
    sendLabel:'📤 Enviar estado',
    sendSub:'Toca puertas para cambiar',sendSubChanged:'Hay cambios',
    sendSubLast:'Último',sendSubPending:'· Pendiente',
    empty:'Esperando camiones...',emptySub:'BALIE los registra desde la oficina',
    pending:'🟣 PENDIENTES',downloaded:'✅ DESCARGADOS',
    done:'Descargado',regBtn:'📋 Registrar descarga',
    modalTitle:'🚛 Camión',modalPuerta:'Puerta',
    dirGericht:'→ Gericht',dirBONT:'→ BONT',
    firmaLabel:'Firma GC medewerker',firmaPlace:'Tu nombre',
    subBtn:'📤 Enviar descarga',cancel:'Cancelar',
    sendOk:'✅ Descarga # enviada',firmAlert:'Firma tu nombre',
    badgeLabel:'Tocar',
    online:'En vivo',syncing:'Enviando...',ok:'OK',
    truckAct:'📦 Camiones',
    settingsTitle:'⚙️ Ajustes',openBtn:'▶ Abrir día',closeBtn:'■ Cerrar día',
    exportBtn:'⬇ Exportar CSV',
    dayConfirmOpen:'¿Abrir un nuevo día? Se borrará el día anterior.',
    dayConfirmClose:'¿Cerrar el día?',
    dayOpen:'🟢 Día abierto',dayClosed:'🔴 Día cerrado',
    dayStart:'Sin día activo',encargadoName:'Tu nombre',
    encargadoPlace:'Nombre del encargado',saveName:'💾 Guardar nombre',
    noData:'No hay datos',close:'Cerrar',
    noTrucks:'No hay camiones hoy',selectReason:'Selecciona un motivo'},
  en:{title:'📋 BaySync · Warehouse',brand:'📋 <span>BaySync</span> · Warehouse',
    tabs:['🚪 Doors','📦 Trucks'],
    libre:'🟢 Free',ocupado:'🔴 Occupied',parcial:'🟡 Partial',
    sendLabel:'📤 Send state',
    sendSub:'Tap doors to change',sendSubChanged:'Changes pending',
    sendSubLast:'Last',sendSubPending:'· Pending',
    empty:'Waiting for trucks...',emptySub:'BALIE registers them from the office',
    pending:'🟣 PENDING',downloaded:'✅ UNLOADED',
    done:'Unloaded',regBtn:'📋 Register download',
    modalTitle:'🚛 Truck',modalPuerta:'Door',
    dirGericht:'→ Gericht',dirBONT:'→ BONT',
    firmaLabel:'Warehouse employee signature',firmaPlace:'Your name',
    subBtn:'📤 Submit download',cancel:'Cancel',
    sendOk:'✅ Download # sent',firmAlert:'Sign your name',
    badgeLabel:'Tap',
    online:'Online',syncing:'Sending...',ok:'OK',
    truckAct:'📦 Trucks',
    settingsTitle:'⚙️ Settings',openBtn:'▶ Open day',closeBtn:'■ Close day',
    exportBtn:'⬇ Export CSV',
    dayConfirmOpen:'Open a new day? Previous day data will be cleared.',
    dayConfirmClose:'Close the day?',
    dayOpen:'🟢 Day open',dayClosed:'🔴 Day closed',
    dayStart:'No active day',encargadoName:'Your name',
    encargadoPlace:'Warehouse employee name',saveName:'💾 Save name',
    noData:'No data',close:'Close',
    noTrucks:'No trucks today',selectReason:'Select a reason'},
  nl:{title:'📋 BaySync · Magazijn',brand:'📋 <span>BaySync</span> · Magazijn',
    tabs:['🚪 Deuren','📦 Vrachtwagens'],
    libre:'🟢 Vrij',ocupado:'🔴 Bezet',parcial:'🟡 Gedeeltelijk',
    sendLabel:'📤 Status verzenden',
    sendSub:'Tik op deuren om te wijzigen',sendSubChanged:'Wijzigingen in behandeling',
    sendSubLast:'Laatste',sendSubPending:'· In afwachting',
    empty:'Wachten op vrachtwagens...',emptySub:'BALIE registreert ze vanaf kantoor',
    pending:'🟣 IN AFWACHTING',downloaded:'✅ GELOST',
    done:'Gelost',regBtn:'📋 Lossing registreren',
    modalTitle:'🚛 Vrachtwagen',modalPuerta:'Deur',
    dirGericht:'→ Gericht',dirBONT:'→ BONT',
    firmaLabel:'Handtekening GC medewerker',firmaPlace:'Uw naam',
    subBtn:'📤 Lossing verzenden',cancel:'Annuleren',
    sendOk:'✅ Lossing # verzonden',firmAlert:'Onderteken uw naam',
    badgeLabel:'Tik',
    online:'Online',syncing:'Verzenden...',ok:'OK',
    truckAct:'📦 Vrachtwagens',
    settingsTitle:'⚙️ Instellingen',openBtn:'▶ Dag openen',closeBtn:'■ Dag sluiten',
    exportBtn:'⬇ CSV exporteren',
    dayConfirmOpen:'Een nieuwe dag openen? Vorige dag wordt gewist.',
    dayConfirmClose:'Dag sluiten?',
    dayOpen:'🟢 Dag open',dayClosed:'🔴 Dag gesloten',
    dayStart:'Geen actieve dag',encargadoName:'Uw naam',
    encargadoPlace:'Naam magazijnmedewerker',saveName:'💾 Naam opslaan',
    noData:'Geen gegevens',close:'Sluiten',
    noTrucks:'Geen vrachtwagens vandaag',selectReason:'Selecteer een reden'}
};
// ============================ STATE ============================
const DB='https://baysync-583a2-default-rtdb.europe-west1.firebasedatabase.app';
const CATEGORIES=[{id:'pallet_euro',short:'Euro'},{id:'rcn',short:'RCN'},{id:'ww_pallet',short:'WW'},{id:'hplt',short:'HPLT'},{id:'rotom',short:'Rotom'},{id:'rolcontainer',short:'RCG'},{id:'colli',short:'Colli'},{id:'krat',short:'Krat'},{id:'rek',short:'Rek'}];
const DOORS=[18,19,20,21,22,23,24,25,26];
const DK='baysyncv2_doors_enc',TK='baysyncv2_trucks',LK='baysyncv2_lang',ENC_KEY='baysyncv2_encargado';
let cl='es',doors={},dirty=0,lastSent=null,trucks={},curTab='muelles',curTruck=null,encargado='',dayOpen=false,dayDate='';

function tl(key){const o=LANG[cl];return o?o[key]||key:key}
function t(key,...vals){let s=tl(key);vals.forEach((v,i)=>s=s.replace('{'+i+'}',v));return s}

function setLang(l){cl=l;localStorage.setItem(LK,l);document.documentElement.lang=l;applyLang();}
function applyLang(){
  document.title=t('title');document.getElementById('brandTitle').innerHTML=t('brand');
  const tabs=t('tabs');
  document.getElementById('tabBar').innerHTML=tabs.map((l,i)=>`<button class="tab-btn${i===0?' active':''}" data-t="${['muelles','camiones'][i]}" onclick="switchTab('${['muelles','camiones'][i]}')">${l}${i===0?' <span class="badge" style="font-weight:400">('+t('badgeLabel')+')</span>':''}${i===1?' <span class="badge" id="badgeC">0</span>':''}</button>`).join('');
  document.getElementById('sendLabel').textContent=t('sendLabel');
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===cl));
  renderD();renderT();updBtn();
}
let curTab2='muelles';
function switchTab(t,force){curTab2=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector(`.tab-btn[data-t="${t}"]`);if(btn)btn.classList.add('active');
  document.querySelectorAll('.content').forEach(c=>c.classList.add('hidden'));
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
  if(t==='camiones')renderT();}

// ============================ INIT ============================
function init(){
  try{const s=localStorage.getItem(LK);if(s)cl=s;}catch(e){}
  try{const s=localStorage.getItem(DK);doors=s?JSON.parse(s):{};Object.keys(doors).length||loadDef()}catch(e){loadDef()}
  try{const s=localStorage.getItem(TK);trucks=s?JSON.parse(s):{}}catch(e){}
  try{const s=localStorage.getItem(ENC_KEY);if(s)encargado=s;}catch(e){}
  renderD();updBtn();renderT();poll();applyLang();
  document.getElementById('btnSend').onclick=()=>{if(dirty)sendD();};}
function loadDef(){doors={};DOORS.forEach(d=>doors[d]='libre');svD()}
function svD(){localStorage.setItem(DK,JSON.stringify(doors))}
function renderD(){
  const g=document.getElementById('doorGrid');g.innerHTML='';
  DOORS.forEach(d=>{const st=doors[d]||'libre',lb={libre:'🟢 '+t('libre').replace('🟢 ',''),ocupado:'🔴 '+t('ocupado').replace('🔴 ',''),parcial:'🟡 '+t('parcial').replace('🟡 ','')};
    const el=document.createElement('div');el.className='door '+st;el.innerHTML=`<span class="db">✏️</span><div class="num">${d}</div><div class="label">${lb[st]}</div>`;
    el.onclick=()=>{const c=doors[d]||'libre';doors[d]=c=='libre'?'ocupado':c=='ocupado'?'parcial':'libre';svD();dirty=1;renderD();updBtn()};g.appendChild(el);});
  document.querySelectorAll('#doorGrid .door').forEach(e=>e.classList.toggle('dirty',dirty));}
function updBtn(){const b=document.getElementById('btnSend');const sub=document.getElementById('sendSub');b.disabled=!dirty;
  if(lastSent)sub.textContent=(dirty?t('sendSubChanged'):'')+' '+t('sendSubLast')+': '+lastSent+(dirty?' '+t('sendSubPending'):'');
  else sub.textContent=dirty?t('sendSubChanged'):t('sendSub');}
async function sendD(){setS('syncing',t('syncing'));try{await fetch(DB+'/muelles.json',{method:'PUT',body:JSON.stringify({doors:doors,sentAt:Date.now()})})}catch(e){}
  dirty=0;lastSent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});svD();renderD();updBtn();setS('on',t('ok'));}
function setS(m,txt){const d=document.getElementById('sD'),s=document.getElementById('sT');if(d)d.className='sdot '+(m==='on'||m==='syncing'?'on':'off');if(s)s.textContent=txt;}
function badge(){const e=document.getElementById('badgeC');if(e)e.textContent=Object.values(trucks).filter(t=>t.activo&&!t.completado&&!t.despachado).length;}

function renderT(){
  const l=document.getElementById('truckList'),a=Object.values(trucks).filter(t=>t.activo&&!t.completado&&!t.despachado),c=Object.values(trucks).filter(t=>t.completado&&!t.despachado);
  if(!a.length&&!c.length){l.innerHTML='<div class="empty-state"><div class="icon">📭</div>'+t('empty')+'<br>'+t('emptySub')+'</div>';badge();return;}
  let h='';if(a.length){h+='<div style="font-size:10px;color:#7c4dff;font-weight:700;margin-bottom:4px">'+t('pending')+' ('+a.length+')</div>';a.sort((x,y)=>y.creado-x.creado).forEach(tk=>h+=tcard(tk,0));}
  if(c.length){h+='<div style="font-size:10px;color:#00e676;font-weight:700;margin:8px 0 4px">'+t('downloaded')+' ('+c.length+')</div>';c.forEach(tk=>h+=tcard(tk,1));}
  l.innerHTML=h;
  document.querySelectorAll('.btn-op').forEach(b=>b.onclick=function(){const x=Object.values(trucks).find(t=>t.id===this.dataset.id);if(x)openF(x);});badge();}
function tcard(tk,d){const p=tk.proveedores.slice(0,2).join(', ')+(tk.proveedores.length>2?' +'+(tk.proveedores.length-2):'');return `<div class="truck-card ${d?'done':''}"><div class="head"><div class="id">🚛 #${tk.id}</div><div class="door">🚪 ${tk.puerta}${tk.puerta2?'/'+tk.puerta2:''}</div></div><div class="prov">📦 ${p}</div><div class="time">🕐 ${tk.llegada||'--:--'} · 🔑 ${tk.llave}</div>${d?'<div style="text-align:center;color:#00e676;font-size:11px;font-weight:600">'+t('done')+'</div>':'<button class="btn-op" data-id="'+tk.id+'">'+t('regBtn')+'</button>'}</div>`;}

function openF(tk){curTruck=JSON.parse(JSON.stringify(tk));const m=document.getElementById('modalContent');let h=`<button class="close-modal" onclick="closeM()">&times;</button><h3>🚛 ${t('modalTitle')} #${tk.id} · ${t('modalPuerta')} ${tk.puerta}</h3><p style="font-size:10px;color:#888;margin-bottom:6px">🕐 ${tk.llegada||'--:--'} · 🔑 ${tk.llave}</p>`;
  tk.proveedores.forEach((p,i)=>{const d=curTruck.descargas[i]||{};h+=`<div class="prov-section"><h4>📦 ${p}</h4><div style="display:flex;gap:4px;margin-bottom:4px"><button class="dir-btn ${d.gericht?'active':''}" onclick="tDir(${i},'gericht')">${t('dirGericht')}</button><button class="dir-btn ${d.bont?'active':''}" onclick="tDir(${i},'bont')">${t('dirBONT')}</button></div><div class="qty-grid">${CATEGORIES.map(c=>`<div class="qty-item"><label>${c.short}</label><input type="number" min="0" value="${d[c.id]||0}" oninput="upQ(${i},'${c.id}',this.value)"></div>`).join('')}</div></div>`;});
  h+=`<div style="margin:6px 0"><div style="font-size:10px;color:#aaa;margin-bottom:3px">${t('firmaLabel')}:</div><input class="firma-input" id="firmInp" placeholder="${t('firmaPlace')}" value="${tk.firma_encargado||encargado}"></div><button class="btn-pri btn-grn" onclick="subD()">${t('subBtn')}</button><button class="btn-pri btn-redd" onclick="closeM()">${t('cancel')}</button>`;
  m.innerHTML=h;document.getElementById('modalOv').classList.add('show');}
function tDir(i,dir){if(!curTruck||!curTruck.descargas[i])return;curTruck.descargas[i][dir]=!curTruck.descargas[i][dir];}
function upQ(i,c,v){if(curTruck&&curTruck.descargas[i])curTruck.descargas[i][c]=parseInt(v)||0;}
function closeM(){document.getElementById('modalOv').classList.remove('show');curTruck=null;}
async function subD(){if(!curTruck)return;const f=document.getElementById('firmInp').value.trim();if(!f){alert(t('firmAlert'));return;}
  curTruck.firma_encargado=f;curTruck.completado=true;curTruck.descarga_completa=Date.now();
  trucks[curTruck.id]={...curTruck};localStorage.setItem(TK,JSON.stringify(trucks));
  if(navigator.onLine)try{await fetch(DB+'/camiones/'+curTruck.id+'.json',{method:'PUT',body:JSON.stringify(curTruck)})}catch(e){}
  closeM();renderT();document.getElementById('modalContent').innerHTML=`<div class="send-ok">${t('sendOk')} #${curTruck.id}</div>`;document.getElementById('modalOv').classList.add('show');setTimeout(()=>document.getElementById('modalOv').classList.remove('show'),2000);}

function openSettings(){
  const m=document.getElementById('modalContent');
  m.innerHTML=`<button class="close-modal" onclick="closeM()">&times;</button>
    <h3>⚙️ ${t('settingsTitle')}</h3>
    <div style="font-size:11px;color:#888;margin-bottom:8px">${dayOpen?t('dayOpen')+' — '+dayDate:t('dayClosed')}</div>
    <button class="btn-pri btn-grn" onclick="closeM();encOpenDay()">${t('openBtn')}</button>
    <button class="btn-pri btn-redd" onclick="closeM();encCloseDay()">${t('closeBtn')}</button>
    <button class="btn-pri" style="background:#333" onclick="closeM();expCSV()">${t('exportBtn')}</button>
    <hr style="border:none;border-top:1px solid #333;margin:10px 0">
    <div style="font-size:11px;color:#aaa;margin-bottom:4px">${t('encargadoName')}:</div>
    <input class="firma-input" id="encNameInp" placeholder="${t('encargadoPlace')}" value="${encargado}">
    <button class="btn-pri btn-grn" onclick="saveEnc()">${t('saveName')}</button>
    <button class="btn-pri" style="background:#333;margin-top:10px" onclick="closeM()">${t('close')}</button>`;
  document.getElementById('modalOv').classList.add('show');
}
function saveEnc(){
  const v=document.getElementById('encNameInp').value.trim();
  if(v){encargado=v;localStorage.setItem(ENC_KEY,v);closeM();}
}
function encOpenDay(){
  if(!confirm(t('dayConfirmOpen')))return;
  dayOpen=true;dayDate=new Date().toISOString().split('T')[0];
  fetch(DB+'/dia.json',{method:'PUT',body:JSON.stringify({abierto:true,fecha:dayDate,contador:1})}).catch(()=>{});
}
function encCloseDay(){
  if(!confirm(t('dayConfirmClose')))return;
  dayOpen=false;
  fetch(DB+'/dia.json',{method:'PUT',body:JSON.stringify({abierto:false,fecha:dayDate})}).catch(()=>{});
}
function expCSV(){
  const rows=Object.values(trucks).filter(t=>!t.espera);
  if(!rows.length){alert(t('noData'));return;}
  const h=['ID','Puerta','Proveedor','Llegada','Salida','Total min','Llave'];CATEGORIES.forEach(c=>h.push(c.short));h.push('Dirección','Firma Bo','Firma Driver');
  const csv=rows.map(t=>t.proveedores.map((p,i)=>{const d=t.descargas[i]||{};let min='';if(t.llegada&&t.salida){const[l1,l2]=t.llegada.split(':').map(Number);const[s1,s2]=t.salida.split(':').map(Number);let m=s2+s1*60-(l2+l1*60);if(m<0)m+=1440;min=m;}const dir=(d.gericht?'Gericht':'')+(d.gericht&&d.bont?'/':'')+(d.bont?'BONT':'');return[t.id,t.puerta,p,t.llegada||'',t.salida||'',min,t.llave,...CATEGORIES.map(c=>d[c.id]||0),dir,t.firma_bo||'',t.firma_driver||''].join(';')}).join('\n')).join('\n');
  const blob=new Blob(['\ufeff'+[h.join(';'),csv].join('\n')],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Lostijden_BONT_'+dayDate+'.csv';a.click();URL.revokeObjectURL(a);
}
function poll(){
  setInterval(async()=>{try{const r=await fetch(DB+'/dia.json');const d=await r.json();if(d){dayOpen=d.abierto||false;dayDate=d.fecha||'';}}catch(e){}},5000);
  setInterval(async()=>{try{const r=await fetch(DB+'/muelles.json');const d=await r.json();if(d&&d.doors&&!dirty){doors=d.doors;svD();renderD();updBtn()}}catch(e){}},3000);
  setInterval(async()=>{try{const r=await fetch(DB+'/camiones.json');const d=await r.json();if(d){let c=0;Object.entries(d).forEach(([k,v])=>{if(v&&v.activo&&!v.despachado&&(!trucks[k]||JSON.stringify(trucks[k].descargas)!==JSON.stringify(v.descargas)||trucks[k].completado!==v.completado)){trucks[k]=v;c=1}});Object.keys(trucks).forEach(k=>{if(!d[k]||d[k].despachado){delete trucks[k];c=1}});if(c){localStorage.setItem(TK,JSON.stringify(trucks));badge();renderT()}}}catch(e){}setS('on',t('online'));},3000);}
init();
</script>
</body>
</html>
